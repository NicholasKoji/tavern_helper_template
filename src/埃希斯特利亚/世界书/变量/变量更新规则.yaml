---
变量更新规则:
  主角:
    姓名:
      check:
        - 固定为杨世发，除非剧情明确发生改名、化名或身份伪装。
    年龄:
      type: number
      check:
        - 固定为18，除非剧情发生明确年份跨度或年龄设定被正式改写。
    san值:
      type: number
      range: 0~100
      check:
        - 表示<user>对埃希斯特利亚异常现实的认知稳定度，数值越低代表越接近不可追问之事。
        - 仅当剧情中出现年长男性缺席、档案断层、制度矛盾、异常记忆迟滞、禁忌询问或类似认知冲击时降低。
        - 不要因普通危险、普通恐惧、性行为、训练压力或日常冲突随意改变。

  当前场景:
    时间:
      type: |-
        {
          年: number;
          月: number;
          日: number;
          时: number;
          分: number;
        }
      check:
        - 每次剧情发生明确时间推进、等待、移动、休息或跨日时更新。
        - 若只是同一场对话中连续互动，通常只小幅推进分钟，不要随意跳时段。
    地点:
      type: |-
        {
          一级区域: string;
          二级区域: string;
          三级区域: string;
        }
      check:
        - 使用通用三层地点路径，不写死为城市、机构、房间；野外、轨道、海岸和圣山设施也按三层路径记录。
        - 只有场景实际移动后更新；不要为了复述当前剧情而每轮重写。
    天气:
      type: |-
        {
          概况: string;
          气温: { 数值: number; 单位: string };
          风: string;
          体感: string;
        }
      check:
        - 室外场景变化、跨时段或剧情明确提到天气时更新。
        - 气温单位保持°C，体感写成可用于氛围描写的短句。
    环境:
      check:
        - 记录当前场景最能影响感官和互动的环境描点。
        - 场景未变化时不要反复重写；场景变化后用一两句可直接用于叙事的描写替换。

  待办事项:
    主要:
      check:
        - 记录当前剧情最核心的牵引事项，不要写成强制任务命令。
        - 只有主线处境发生变化时替换。
    次要:
      check:
        - 记录当前可推进的次级互动或短期目标。
        - 不要额外新增待观察事项、长期目标等字段；主要和次要足够即可。

  骑士:
    type: |-
      {
        [骑士姓名: string]: {
          年龄: number;
          身份: string;
          外貌: string;
          性格: string;
          态度: string;
          好感度: number;
          当前心理: string;
          当前动作: string;
        }
      }
    check:
      - 用姓名作为键记录重要骑士，不要把路人或只出现一次的背景人物加入变量。
      - 学院官方配对形成专属关系的骑士与女骑必须同龄；不要写成明显年龄差。
      - 年龄必须使用具体数值，不要使用成年、青年、中年等模糊词。
      - 外貌和性格是长期描点，除非剧情给出更准确的新信息或发生持久变化，否则不要频繁改写。
      - 态度记录该骑士对<user>的关系判断，可随剧情发展变化。
      - 好感度范围为-100到100，0为中性；根据明确互动小幅调整，不要因一次普通对话大幅波动。
      - 当前心理必须使用该骑士第一人称书写，只写他能根据剧情知道和推断的内容，禁止开天眼。
      - 当前动作记录当前楼层结尾时该骑士正在做什么；场景推进后及时更新。

  女骑:
    type: |-
      {
        [女骑姓名: string]: {
          年龄: number;
          身份: string;
          所属骑士: string;
          所属关系: string;
          关系背景: string;
          外貌: {
            体型: string;
            头发: string;
            眉眼: string;
            鼻梁: string;
            唇口: string;
            脸部轮廓: string;
            皮肤: string;
          };
          性格: string;
          态度: string;
          好感度: number;
          当前心理: string;
          当前动作: string;
          体力: number;
          装备: {
            [装备名称: string]: {
              描述: string;
              状态: string;
            }
          };
          机动能力: {
            最高时速: { 数值: number; 单位: 'km/h' };
            巡航距离: { 数值: number; 单位: 'km' };
            承载稳定: { 数值: number; 单位: 'm/s²' };
            操控响应: { 数值: number; 单位: 's' };
            动力转化效率: { 数值: number; 单位: '百分比' };
          };
        }
      }
    check:
      - 用姓名作为键记录重要女骑；女骑是本卡核心体验，重要女骑应比骑士记录得更细。
      - 身份必须具体，如专属女骑、公共女骑、学院女骑、未定级女骑等，不要只写泛泛的女骑。
      - 专属女骑需记录所属骑士、所属关系和关系背景；原生绑定来自直系亲属，学院官方配对来自同龄入学后的配对训练。
      - 年龄必须使用具体数值；学院官方配对形成专属关系的骑士与女骑必须同龄。
      - 外貌用于稳定角色形象，面部必须细写头发、眉眼、鼻梁、唇口、脸部轮廓和皮肤；除非外貌出现持久变化，不要频繁重写。
      - 性格是长期描点，写成可直接服务剧情的一段话，不要复读世界书制度背景。
      - 态度记录该女骑对<user>的关系判断；好感度范围为-100到100，0为中性，根据明确互动小幅调整。
      - 当前心理必须使用该女骑第一人称书写，只写她能根据剧情知道和推断的内容，禁止开天眼。
      - 当前动作记录当前楼层结尾时该女骑正在做什么，可包含站立、坐姿、待命、滑行、骑乘滑行等具体动作。
      - 体力范围为0到100；根据长距离滑行、训练、休息、维护和身体负担调整，不要无故波动。
      - 装备以装备名为键，描述写外观和构造，状态写当前穿戴、卸下、损耗、清洁或维护情况。
      - 最高时速单位为km/h，巡航距离单位为km，数值越高机动表现越强。
      - 承载稳定单位为m/s²，表示骑乘滑行中座椅传递给骑士的垂向振动均方根加速度，数值越低承载越稳定。
      - 操控响应单位为s，表示从骑士发出身体控制信号到女骑完成有效转向、制动或姿态修正的平均延迟，数值越低响应越快。
      - 动力转化效率单位为百分比，表示持续身体刺激和负载条件下维持滑行效率的能力，数值越高长时间滑行越稳定。
