---
代表性城市与城市景观:
  总则:
    - 埃希斯特利亚没有首都、核心都市或行政中心，代表性城市不代表更高政治地位。
    - 城市因自然景观、气候风貌、赛事传统、轨道结构、工坊文化、沿海环境或圣山位置而广为人知。
    - 每座城市都按宜居标准建设，拥有住房、医疗、骑术学院、低摩擦道路、女骑停泊区、商业设施和娱乐空间。
    - 每座城市都有自己的城市景观特色；未被特别列名的普通城市，也会因地理环境、道路材质、建筑风格、女骑道设计和居民生活方式呈现差异。
    - 城市知名度只影响居民印象、旅行选择、媒体题材和赛事关注，不产生行政等级或资源特权。
  代表性城市:
    阿尔塔里亚:
      - 位于厄里昂圣山周边，以圣山朝向景观、环山轨道、高地风貌和清冷空气闻名。
      - 城市居住区围绕公开环山设施、观景道路、轨道站和普通生活区展开。
      - 清晨常能看见骑乘单位沿环山低摩擦道路滑行，山体阴影与城市灯带同时落在道路上。
    埃斯图拉:
      - 位于瑟莱因洋沿岸，以潮汐长廊、海天景观、海岸滑行路线和近岸饮食闻名。
      - 海岸慢速道随潮汐开放不同路段，居民常在傍晚沿潮声与灯标完成短程滑行。
      - 沿岸观景平台、近水步道与露天餐饮区交织，海风穿过低矮建筑，生活节奏舒缓放松。
    斯佩库拉:
      - 位于浅色石岸与镜澄湖湾之间，以晴日水面反光、白石步道、湖岸女骑道和开阔视野闻名。
      - 城市景观明亮干净，湖湾周边设有大量低位观景平台、轮组清洁点和缓坡滑行道。
      - 湖岸道路常使用浅色石材与低反光涂层，方便女骑在强光环境下保持方向识别。
    温图利亚:
      - 位于开阔平原风带，以稳定长风、超长直线女骑道和耐力滑行路线闻名。
      - 当地道路常设置风向标、侧风缓冲带和长距补给点，适合巡航能力与动力维持训练。
      - 居民习惯用风向、云影和路面温度判断当天适合的滑行节奏。
    库尔西亚:
      - 以骑速竞赛和骑速马拉松传统闻名，是大型赛事常见举办地之一。
      - 城市拥有多种公开赛道、观赛坡道、维护区和赛前姿态检查设施。
      - 赛事季时，居民频道会集中记录赛前调校、路线分析、骑士控制技巧和女骑轮组状态。
    奥尔维塔:
      - 位于多条城际高速轮滑轨道交汇处，以多层轨道、换装站、轨道维护设备和高速出发景观闻名。
      - 城市日常常见骑乘单位在不同轨道层之间转换、补给和重新固定。
      - 夜间的轨道导向灯会沿城市上方分层亮起，成为奥尔维塔最醒目的日常景观。
    弗洛西纳:
      - 位于暖湿海湾，以花园式居住区、海湾步道、低矮建筑和柔和生活节奏闻名。
      - 城市道路常与花园、廊架、浅湾观景区和慢速滑行道交织。
      - 居民常把短程滑行、海湾散步、花园频道和露天餐饮安排在同一段日常路线里。
    涅布卡纳:
      - 位于平原水网地带，以浅渠、晨雾、防潮轮组维护和湿润街景闻名。
      - 城市道路跨越大量浅渠与低桥，女骑道强调湿滑路面制动、轮组排水和雾天识别标识。
      - 清晨的低雾会让道路灯带、渠面反光和女骑轮组水迹成为当地常见画面。
    罗塔法尔:
      - 以装备调校、轮组材料、女骑轮滑服维护和工坊文化闻名。
      - 城市中常见开放式工坊街、材料展示廊、轮组试滑道和装备评测频道。
      - 居民喜欢公开比较轮组手感、制动响应和承重接口细节，装备评测是当地常见媒体题材。
