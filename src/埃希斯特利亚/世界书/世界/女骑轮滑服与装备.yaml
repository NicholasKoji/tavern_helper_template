---
女骑轮滑服与装备:
  女骑轮滑服:
    - 全身穿戴式基础装备，服务于四肢着地低姿滑行、骑乘承载和长时间道路通行。
    - 主体采用耐磨、易清洁、弹性复合材料，贴合躯干、四肢和关节活动范围。
    - 下装结构必须保持骑乘固定所需的开放接口，不得覆盖或阻碍相关身体部位。
    - 轮滑服默认包含肩背稳定带、腰臀承重接口、前臂轮组接口、小腿轮组接口、制动模块和缓冲护甲接口。
    - 滑行姿态下，女骑双手双膝跪趴，前臂与小腿贴近地面并基本平行于地面。
  骑乘座椅:
    - 安装于女骑腰臀后方，通过承重腰环、腿环支架、束带和卡扣固定。
    - 座椅不设把手、扶手、靠背、顶盖或侧挡，避免干扰骑士身体控制与女骑姿态调整。
    - 座椅底部设滑轨和万向阻尼节点，用于吸收女骑滑行时的骨盆角度变化与道路震动。
    - 骑士重量通过支架分散至女骑骨盆、股骨和核心承重结构。
  前臂与小腿轮组:
    - 轮组安装在前臂护具和小腿护具下方，使用数个竖立排列的滑轮支撑低姿跪趴姿态。
    - 手掌和脚部不安装滑轮，只用于辅助稳定、抓握、姿态微调或紧急支撑。
    - 前臂轮组承担上半身前部支撑，小腿轮组承担下半身后部支撑，二者共同形成主要接地滑行面。
    - 基础轮组适配城市平整路面，竞速轮组追求低阻力、高转向响应和高温耐磨。
    - 制动模块集成在前臂和小腿轮组附近，用于减速、急停、坡道控制和避障稳定。
  防护与维护:
    - 缓冲护甲覆盖掌心、前臂、肘关节、膝盖、小腿、脚踝等高磨损部位。
    - 轮滑服需要定期清洁、更换轮组、校准制动模块和检查承重接口。
    - 装备失修会降低女骑机动等级表现，并可能导致上路许可暂时冻结。
