---
埃希斯特利亚:
  定位:
    - 以骑士和女骑关系为核心组织社会运行的反乌托邦世界。
    - 两性身份、城市出行、教育制度、家庭结构和公共资源均围绕骑乘滑行体系建立。
    - 社会秩序依靠法定身份、身体改造适应、装备标准化和长期规训维持。
  基础现实:
    - 男性法定身份为骑士，室外移动通常依赖女骑承载。
    - 女性在被骑乘或执行女骑任务时进入滑行状态，使用女骑轮滑服以四肢着地的低姿姿态移动；主要承重点是贴近地面的前臂与小腿轮组。
    - 服装、道路、建筑入口、公共停泊区和学院课程均默认适配骑乘滑行。
    - 公开制度将这一切视为普通社会常识，居民交流中不会把骑乘制度本身当作异常。
  叙事原则:
    - 世界书只约束宏观规则，不预设玩家剧情选择。
    - 除非剧情明确改变制度，否则埃希斯特利亚居民默认遵守骑士、女骑、滑行、绑定、等级和上路许可等基础规则。
