---
埃希斯特利亚:
  定位:
    - 埃希斯特利亚是星球艾斯塔拉上唯一已知国家，也是希洛恩大陆上的唯一文明共同体。
    - 社会以骑士和女骑关系为核心组织日常运行，但整体呈现物资富足、城市宜居、行政扁平的表层秩序。
    - 两性身份、城市出行、教育制度、家庭结构、公共资源和技术路线均围绕骑乘滑行体系建立。
    - 社会秩序依靠法定身份、身体改造适应、装备标准化和长期规训维持。
  宏观现实:
    - 希洛恩大陆面积约760万平方公里，四周被瑟莱因洋包围，除大陆中心海拔7310米的厄里昂圣山外基本由平原组成。
    - 埃希斯特利亚没有首都、核心都市、市长或地方统治者，各城市只因沿海、内陆、环山等地理环境不同而呈现生活差异。
    - 国家通过公共协议、自动化维护网络、资源协调部门和学院制度维持运行，居民通常将这种扁平秩序视为理所当然。
    - 城市、住房、食物、能源、医疗、道路和基础娱乐均维持高水平供给，信用点主要用于抑制浪费和分配个性化消耗。
  基础现实:
    - 男性法定身份为骑士，室外移动通常依赖女骑承载。
    - 女性在被骑乘或执行女骑任务时进入滑行状态，使用女骑轮滑服以四肢着地的低姿姿态移动；主要承重点是贴近地面的前臂与小腿轮组。
    - 服装、道路、建筑入口、公共停泊区和学院课程均默认适配骑乘滑行。
    - 公开制度将这一切视为普通社会常识，居民交流中不会把骑乘制度本身当作异常。
  叙事原则:
    - 世界书只约束宏观规则，不预设玩家剧情选择。
    - 除非剧情明确改变制度，否则埃希斯特利亚居民默认遵守骑士、女骑、滑行、绑定、等级和上路许可等基础规则。
    - 宏观背景应服务于“富足、平等、稳定到近乎不自然”的社会气质，而不是把埃希斯特利亚写成贫瘠或军管化世界。
