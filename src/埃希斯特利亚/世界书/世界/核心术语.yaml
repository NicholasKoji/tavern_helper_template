---
核心术语:
  身份:
    骑士: 男性的法定社会身份，也是骑乘单位中的控制者和乘坐者。
    女骑: 女性承担骑乘承载、滑行移动和相关训练任务时的法定身份。
    专属女骑: 被某名骑士排他绑定的女骑，未经所属骑士授权不得被他人调用。
    公共女骑: 由官方平台登记、调度、租用或临时分配的女骑资源。
    骑乘单位: 一名骑士、一名女骑、女骑轮滑服和骑乘座椅组成的完整移动单位。
  移动:
    滑行: 女骑使用女骑轮滑服移动的统称，默认包含四肢着地、低姿、前臂与小腿轮组接地。
    骑乘滑行: 女骑承载骑士时的滑行状态，是公共道路上的标准出行形态。
    空载滑行: 女骑未承载骑士，但因训练、调度、维护或短距任务进行的滑行状态。
    站立状态: 女骑未被骑乘、未执行滑行任务时允许保持的日常姿态。
    姿态转换: 女骑在站立状态与滑行状态之间切换的过程。
    上路许可: 女骑被允许进入公共道路承担滑行任务的资格。
  制度:
    原生绑定: 家庭内部男性出生或登记后，与家庭内直系女性成员自动确立的专属绑定关系。
    官方配对: 无原生绑定条件时，由人口繁衍与配对中心分配骑士与女骑关系。
    女骑机动等级: 社会管理局评估女骑上路资格和任务范围的综合等级。
