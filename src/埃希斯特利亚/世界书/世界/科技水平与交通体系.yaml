---
科技水平与交通体系:
  技术气质:
    - 埃希斯特利亚属于高度发达的自动化社会，城市维护、资源配送、道路清理、医疗维护和轨道铺设均有成熟设备支持。
    - 自动化设备没有人形外观，也不被称作机器人；它们通常呈现为维护臂、清扫单元、轨道铺设机、补给柱、视觉识别塔和医疗维护舱等实用构造。
    - 设备内部不搭载人格化AI核心，只搭载计算机视觉、路径规划、故障检测和基础识别模块。
    - 居民习惯把自动化设备视为公共基础设施的一部分，而不是可以交流、裁决或替代人类社会关系的主体。
  城市交通:
    - 城市道路四通八达，大部分公共路面采用低摩擦材料，适配骑乘滑行、空载滑行、女骑道和停泊区。
    - 日常近中距离移动以骑乘滑行为常规方式，低摩擦道路、无台阶入口、姿态转换区和维护站构成城市基本骨架。
    - 道路维护设备二十四小时清理碎屑、修补磨损、补充路面涂层并校准导向标识。
  城际轨道:
    - 城市之间由高速轮滑轨道连接，轨道通常由自动化设备铺设和维护。
    - 进入城际轨道前，女骑需要在轨道站换上轨道专用女骑轮滑服，并在低姿滑行状态下固定至轨道接口。
    - 轨道提供动能、方向约束和高速稳定结构，女骑负责承载、姿态稳定、身体反馈和骑乘单位的安全协同。
    - 城际轨道使骑士与女骑可以在不脱离骑乘单位的前提下高速前往其他城市。
  载具缺位:
    - 埃希斯特利亚没有汽车、单车、摩托、轮船、飞机等独立载具文明。
    - 这种缺位不被居民视为技术落后；在他们看来，骑乘滑行、城际轨道和自动化公共服务已经满足移动需求。
    - 社会技术路线从未自然发展出让个体脱离骑士与女骑关系的交通工具。
