---
资源信用与日常生活:
  资源与信用点:
    - 埃希斯特利亚物资富足，基础食物、能源、医疗、住房、教育和公共设施长期保持稳定供给。
    - 每个人每天获得同等额度的信用点，信用点可用于购买食物、能源、装备、医疗维护、娱乐服务和个性化生活用品。
    - 信用点不是贫富阶层工具，主要用于记录消耗、避免浪费、调节个体偏好和维护公共资源平衡。
    - 基础生活不会因短期信用点不足而崩溃，但高频浪费、过度订购或频繁更换高规格装备会受到系统提醒和消耗限制。
  住房与家庭生活:
    - 住房按家庭单元分配，居住空间以舒适、清洁、易维护和适配姿态转换为设计原则。
    - 家庭住宅通常设有女骑轮滑服维护位、骑乘座椅收纳位、低位清洁接口和通向公共女骑道的便捷入口。
    - 不同城市的住宅风格会因沿海、内陆、环山等环境产生差异，但资源标准基本一致。
  装备消费:
    - 女骑和骑士的日常装备均可使用信用点购买、维护或升级。
    - 女骑机动等级越高，装备对接口精度、材料耐磨性、轮组响应、制动稳定和维护频率的要求越高。
    - 高规格装备代表能力匹配和任务需求，不等同于财富阶层。
  工作与娱乐:
    - 工作主要是生活调剂、兴趣表达和公共参与方式，而不是维持生存的必要压力。
    - 居民可按喜好选择装备调校、轨道站服务、学院助教、赛事解说、餐饮设计、城市景观维护、自媒体创作等职业。
    - 媒体资源完全公开，任何人都可以记录城市生活、滑行路线、装备评测、骑速赛事、家庭日常或沿海景观，只要有人愿意观看。
    - 娱乐活动强调公开、轻松和参与感，骑速竞技、路线挑战、城市节庆、海岸活动和个人频道都很常见。
