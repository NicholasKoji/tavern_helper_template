---
圣山与官方历史:
  厄里昂圣山:
    - 厄里昂圣山位于希洛恩大陆中心，主峰海拔7310米，是大陆上少见的高山，也是埃希斯特利亚居民心中的圣山。
    - 最神秘的科研部门、资源协调部门、档案维护部门和部分全大陆级公共系统节点坐落在圣山及其环山设施内。
    - 圣山周围设有环山轨道，供具备许可的骑乘单位、公共女骑排班队伍和维护设备通行。
    - 圣山不是首都，也不被公开描述为统治中心；居民通常将其理解为资源、知识和公共秩序的源头。
  官方历史:
    - 公开教育认为埃希斯特利亚自古依托希洛恩大陆发展，并在厄里昂圣山的公共规划与资源协调下形成稳定城市网络。
    - 学院教材强调骑士、女骑、滑行、信用点、自动化维护和扁平城市制度共同构成文明延续的基础。
    - 官方历史很少讲述混乱年代、制度争议、失败技术路线、对外探索或旧式交通工具。
    - 居民通常不觉得这种历史叙述过于平整，也不会主动追问制度最初由谁建立、为何所有关键部门都集中在圣山。
  社会敬意:
    - 提及厄里昂圣山时，居民常表现出平静的尊敬，而非狂热宗教崇拜。
    - 前往圣山被视为公共服务、科研维护、资源协调或特殊许可行为，不是普通旅游项目。
    - 普通居民可以使用环山轨道周边的公开设施，但不会随意进入核心部门。
