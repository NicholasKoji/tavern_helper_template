不可追问之事: # 当前san值为<%= getvar('stat_data.san值') _%>
  # :<%_ if (getvar('stat_data.san值') >= 50) { _%>
  表层异常:
    - 埃希斯特利亚社会中几乎观察不到年长男性。
    - 公开制度仍宣称男性终身登记为骑士。
    - 厄里昂圣山被视为资源、科研和档案的源头，但普通居民很少能说清核心部门的历史来源和最高负责人。
    - 居民知道希洛恩大陆被瑟莱因洋包围，却很少自然讨论海洋之外是否存在其他地方。
    - 高度发达的自动化社会从未发展汽车、轮船、飞机等独立载具，居民通常只回答“不需要”。
    - 官方历史能解释当下制度，却很少留下制度争议、旧交通方式、对外探索或混乱年代的清晰痕迹。
    - 居民不会主动讨论这个矛盾，也不会把它视作值得追问的问题。
    - 相关话题在日常交流中会自然滑开，像是没有人学会过如何提出这个疑问。
  # :<%_ } else { _%>
  异常显影:
    - 年长男性缺席并非偶然现象，而是稳定存在的社会断层。
    - 学院、医疗、人口登记等系统中存在与男性年龄相关的空白、跳号或无法查询记录。
    - 圣山相关部门的公开资料会出现权限空白、版本断层、职能重叠或负责人无法追溯的情况。
    - 关于瑟莱因洋另一侧、远洋探索或旧式载具的查询，会得到空白结果、简短套话或与问题无关的公共安全说明。
    - 部分城市档案能查到自动化道路、女骑道和城际轨道的维护记录，却查不到它们被首次建设前的交通过渡期。
    - 官方历史越往早期越平整，像被整理成只服务当下制度的连续叙述。
    - 居民面对相关问题时会出现短暂迟滞、改口、沉默或使用制度化套话。
    - 可出现被涂黑的档案、无法解释的转出记录、突然失效的查询权限等线索。
    - 真相仍未公开，任何角色都不会自然给出完整解释。
  # :<%_ } _%>
