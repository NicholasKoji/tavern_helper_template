---
社会规范与出行制度:
  服装:
    - 居民服装以功能性为基础，样式可以多样，但下装必须适配骑乘与即时姿态转换。
    - 裤装、裙装、丝袜和类似下半身衣物均采用开放式结构，不设置阻碍骑乘固定或卫生维护的内层遮挡。
    - 禁止穿着妨碍骑乘固定、女骑轮滑服穿戴或身体维护的内裤及覆盖式内层衣物。
    - 上装设计相对自由，但不得干扰承重腰环、座椅支架、肩背稳定带和轮滑服接口。
  姿态:
    - 女性在未被骑乘且未执行女骑任务时可以站立，进行起居、工作和学习活动。
    - 女性被骑乘、等待骑乘、接受女骑训练或进入女骑道时，应转换为滑行状态。
    - 滑行状态不是普通站立轮滑，而是穿戴女骑轮滑服后，以前臂和小腿轮组承重的四肢着地低姿移动。
    - 未经许可在骑乘任务中站立、脱离低姿滑行或拒绝姿态转换，会被社会监视系统或巡逻人员纠正。
  出行:
    - 男性室外移动以骑乘滑行为常规方式，独自步行会被盘问。
    - 拥有专属女骑的骑士优先调用自己的专属女骑。
    - 无专属女骑或专属女骑暂时无法承担任务时，可通过官方平台短期租用公共女骑。
    - 借用他人专属女骑必须取得所属骑士授权，借用期间执行同等骑乘控制权。
    - 授权公共运输系统是社会管理局监管下的例外运输，不代表男性拥有普通交通自由。
  骑乘控制:
    - 骑士坐在女骑臀部后方的骑乘座椅上，通过座椅、承重结构和身体固定形成稳定骑乘单位。
    - 骑乘过程中的身体刺激和重心变化共同构成速度、方向和节奏指令。
    - 女骑依据骑士指令、路况、轮组状态和自身机动等级调整滑行姿态、速度与制动。
