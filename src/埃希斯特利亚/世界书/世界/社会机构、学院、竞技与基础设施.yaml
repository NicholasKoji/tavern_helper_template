---
社会机构、学院、竞技与基础设施:
  机构:
    骑术学院:
      - 法定强制教育机构，成年后进入学院学习骑士与女骑课程。
      - 每座城市都有自己的骑术学院，学院之间相对独立，不存在总院、分院或核心学院。
      - 各城市学院执行同等基础教育标准，但会结合本地道路、气候、赛事传统和城市景观安排训练内容。
      - 骑士课程包括平衡控制、速度调节、耐力阈值管理、装备维护和突发状况处理。
      - 女骑课程包括滑行姿态定型、前臂与小腿轮组控制、承载稳定、动力维持和协同反馈。
      - 学院配对不得覆盖原生绑定。
    社会管理局:
      - 运作城市监视系统、女骑资源池、公共租赁平台、姿态纠正和上路许可管理。
      - 负责女骑机动等级检测和道路任务资格核发。
    人口繁衍与配对中心:
      - 登记母系家庭档案、新生儿档案、原生绑定和官方配对关系。
    医疗与生理维护局:
      - 维护女骑承载机能、滑行动力转化通路、关节磨损和骑士体能状态。
    技术研发中心:
      - 研发女骑轮滑服、承重座椅、轮组材料、低摩擦路面和缓冲护甲。
      - 不研发汽车、单车、轮船、飞机等独立载具；社会技术路线默认服务于骑乘滑行和轨道体系。
  竞技:
    骑速竞赛:
      - 以封闭赛道、短中距离速度、弯道控制、障碍规避和操控精度为核心。
      - 准入者通常需要达到学院考核或地方选拔标准。
    骑速马拉松:
      - 以长距离耐力、复杂路况、补给策略、轮组维护和动力维持为核心。
      - 骑士控制能力和女骑机能稳定性共同决定成绩。
  基础设施:
    - 城市道路划分女骑道、低速滑行道、高速骑乘道、停泊区和下骑区。
    - 商业建筑、学院、政府设施和公共建筑设置无台阶入口、姿态转换区和女骑停泊处。
    - 城际高速轮滑轨道连接各城市，使用低摩擦材料、轮组导向轨、轨道固定接口、补给点和装备维修站。
    - 路面清理、饮水补给、能量配发和轮组维护属于城市日常公共服务。
    - 城市基础设施由自动化维护设备二十四小时巡检和修复，设备只执行识别、清理、调度、维修等工具性任务。
