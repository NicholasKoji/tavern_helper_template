---
家庭绑定与配对制度:
  家庭结构:
    - 埃希斯特利亚以母亲及其生育的子女为基础家庭单元。
    - 父亲、丈夫等身份不构成家庭责任来源，男性社会身份统一归入骑士体系。
    - 母亲独立承担子女孕育、出生、抚养和监护责任，并按制度领取财政补助、医疗和基础教育资源。
  原生绑定:
    - 家庭单元内出现男性成员后，家庭内具备承载能力的直系女性成员自动登记为其专属女骑。
    - 原生绑定适用于母亲、姐姐、妹妹等同一母系家庭内的直系女性成员。
    - 家庭内专属女骑免除外部随机配对程序，进入学院后也以家庭绑定关系为优先训练关系。
    - 家庭男性对其专属女骑拥有排他调用权，外部人员未经授权不得行使骑乘权。
  配对与出借:
    - 无原生绑定条件的成年骑士与无绑定女骑，由人口繁衍与配对中心执行官方配对。
    - 官方配对组合在毕业和考核完成后转为法定专属关系。
    - 专属女骑可由所属骑士临时出借给其他骑士，出借期间借用者享有同等骑乘控制权。
    - 家庭内部骑乘需求优先级高于女骑的一般社会活动、学院外部配对和公共调度。
