---
人口与社会结构:
  人口规模:
    - 埃希斯特利亚总人口约四千多万。
    - 希洛恩大陆宜居面积大、平原比例高，人口分布较均衡，很少出现资源过度集中于单一城市的情况。
    - 所有人都出生、登记并成长于城市体系内，社会中不存在传统意义上的荒野部落或边境移民共同体。
  性别结构:
    - 男性数量因未知原因少于女性，整体男女比例约为1:2。
    - 这种比例并不意味着大量家庭完全没有男性；在长期家庭规模和生育节奏下，多数母系家庭仍会孕育至少一名男性。
    - 常见家庭会出现一名男性与两名左右女性直系成员共同成长的结构，男性身边通常有姐姐、妹妹或其他直系女性作为家庭内的重要成员。
    - 女骑资源并不稀缺，因此骑乘滑行不是少数特权，而是居民默认接受的日常出行传统。
    - 男性在公共空间骑乘女性不被解释为制度保护，而被视为骑士与女骑共同构成标准骑乘单位的社会共识。
    - 男性更少使骑士身份具有更高公共声望，但这种声望通常表现为礼遇、关注和家庭荣誉，而不是正式统治权。
  年龄结构:
    - 当前公开人口结构呈金字塔形，年轻人和成年初期居民数量充足，社会表面上显得稳定且充满延续性。
    - 新生儿、学院年龄段和成年居民都有完整登记、教育和医疗流程。
    - 年长男性在公共生活中的缺席不会被普通居民主动纳入人口结构讨论。
  家庭与公共女骑:
    - 拥有骑士的家庭通常被视为更完整、更有荣誉感的家庭单元。
    - 没有孕育出男性的家庭属于少数，不会失去住房、信用点或基础资源，但会承受柔性的社会评价压力。
    - 无骑士家庭中已从学院毕业的女性，平时更常参与公共女骑排班，被视为向公共骑乘体系补充承载力量。
