---
女骑机动等级:
  定义:
    - 社会管理局以女骑机动等级评估女骑上路资格、任务范围和竞技准入。
    - 等级不是只看最高时速，而是五项指标综合评定；任一关键短板会拉低等级。
  指标:
    最高时速: 短距离爆发速度。
    巡航能力: 稳定速度、续航距离和疲劳恢复的综合表现。
    承载稳定: 承受骑士、座椅和道路震动时保持姿态与平衡的能力。
    操控响应: 转向、制动、避障和路况适应的综合能力。
    动力维持: 持续身体刺激和负载条件下维持滑行效率的能力。
  等级:
    N级:
      定位: 未定级。
      标准:
        - 未进入骑术学院或未完成官方检测，无上路许可。
        - 最高时速、巡航能力、承载稳定、操控响应和动力维持均无官方记录。
    E级:
      定位: 训练级。
      标准:
        - 已入院训练但未达上路标准，仅限训练场或监管区域。
        - 最高时速低于15km/h，巡航距离低于2km。
        - 承载稳定、操控响应和动力维持均不稳定，需要教官监管。
    D级:
      定位: 低速级。
      标准:
        - 可在校园、社区、室内慢速区承担短距离低速滑行。
        - 最高时速15-25km/h，巡航距离2-8km。
        - 承载稳定达到基础合格，操控响应只适合平整低速环境，动力维持容易受疲劳影响。
    C级:
      定位: 标准级。
      标准:
        - 合格城市通行女骑，可承担普通日常出行。
        - 最高时速25-40km/h，巡航距离8-25km。
        - 承载稳定、操控响应和动力维持均达到城市道路合格线，可处理常规转向、制动和避障。
    B级:
      定位: 长距级。
      标准:
        - 可承担跨区、长距离和复杂路况骑乘滑行。
        - 最高时速40-60km/h，巡航距离25-80km。
        - 承载稳定强，操控响应适应坡道、湿滑路面和轻度非铺装路况，动力维持能支撑长时任务。
    A级:
      定位: 高速级。
      标准:
        - 可进入高速骑乘道和学院高级科目，具备高速度和高稳定性。
        - 最高时速60-90km/h，巡航距离80-150km。
        - 承载稳定优秀，操控响应可应对高速变道、急停和连续弯道，动力维持衰减较低。
    S级:
      定位: 竞速级。
      标准:
        - 具备正式骑速赛事资格，爆发、巡航、操控和动力维持均达到竞技标准。
        - 最高时速高于90km/h，巡航距离高于150km，或在专项赛事测试中达到同等成绩。
        - 承载稳定、操控响应和动力维持接近个体极限，可承受竞速轮组、高速赛道和长距离赛事压力。
    Ω级:
      定位: 特规级。
      标准:
        - 非公开或极少数异常规格，不属于常规社会评级。
        - 任一关键指标超出公开检测上限，或存在无法用常规机动等级解释的异常表现。
        - Ω级资料通常不在公共学院、赛事或社会管理局普通档案中显示。
