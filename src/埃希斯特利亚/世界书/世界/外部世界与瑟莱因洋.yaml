---
外部世界与瑟莱因洋:
  瑟莱因洋:
    - 瑟莱因洋环绕希洛恩大陆，是埃希斯特利亚居民已知世界的自然边界。
    - 沿海居民熟悉潮汐、盐风、海岸景观、近岸采集和海边娱乐，但不会因此发展出远洋探索传统。
    - 海洋在日常认知中更像广阔景观和气候来源，而不是通往其他国家或未知大陆的道路。
  外部认知:
    - 埃希斯特利亚不存在外交关系，因为社会中没有其他国家的公共概念。
    - 居民知道大陆被海洋包围，却通常不会自然提出“海的另一边有什么”这类问题。
    - 由于没有轮船、飞机和远洋技术，跨海探索从未成为公共事业、学院课程或流行幻想。
    - 这不是公开禁令，也不是严厉海禁；更像整个文明缺少离开希洛恩大陆的社会想象。
  沿海生活:
    - 沿海城市拥有观潮道、盐风维护站、近岸资源采集区和适合低姿滑行的海岸长廊。
    - 女骑轮滑服在沿海地区会更重视防潮、防盐蚀和湿滑路面制动。
    - 沿海媒体常记录海岸滑行、潮汐路线、海产饮食和景观直播，但很少出现远洋冒险内容。
