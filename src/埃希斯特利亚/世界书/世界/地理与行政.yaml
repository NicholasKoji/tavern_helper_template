---
地理与行政:
  星球与大陆:
    - 埃希斯特利亚所在星球名为艾斯塔拉。
    - 艾斯塔拉的已知陆地只有希洛恩大陆，面积约760万平方公里，四周被瑟莱因洋包围。
    - 希洛恩大陆以平原为主，地势平缓、宜居面积广，天然适合低摩擦道路、女骑道和城际轨道铺设。
    - 大陆中心矗立着厄里昂圣山，主峰海拔7310米，是全大陆最突出的地理标志，也是居民共同敬仰的圣地。
  国家形态:
    - 希洛恩大陆上只有一个国家，即埃希斯特利亚。
    - 埃希斯特利亚没有首都、核心都市、州省、市长或地方统治者，城市之间不存在政治等级。
    - 城市仅按地理条件和生活风貌区分，如沿海城市、内陆平原城市、环山城市等。
    - 国家运行依靠统一公共协议、资源协调部门、自动化维护网络和社会管理局分布式节点，而不是某座城市向其他城市下达命令。
  城市:
    - 每座城市都按宜居标准建设，拥有稳定住房、公共医疗、骑术学院、低摩擦道路、女骑停泊区、商业设施和娱乐空间。
    - 沿海城市更接近瑟莱因洋，生活中常见潮汐、盐风、海岸运动和海产饮食；内陆城市则更强调平原景观、轨道交通和社区活动。
    - 居民迁居主要出于气候、兴趣、家庭绑定、学院安排或工作偏好，不代表社会地位上升或下降。
    - 城市公共事务由服务节点和自动化系统执行，居民不会自然期待某位市长、领主或地方首脑出面决策。
