---
社会声望与家庭评价:
  平等与声望:
    - 埃希斯特利亚没有正式阶级，没有贵族、富人、市长或地方统治者，基础资源和公共服务按平等原则分配。
    - 社会尊敬并不完全平均，居民仍会围绕骑士身份、女骑机动等级、家庭完整性和公共贡献形成声望排序。
    - 声望通常表现为礼貌、关注、媒体热度、学院评价、家庭荣誉和公共场合礼遇，而不是法定特权。
  骑士:
    - 骑士是最受尊敬的社会身份，因为男性数量更少，且骑士被视为家庭延续、传统秩序和完整骑乘单位的核心。
    - 这种尊敬不会让骑士成为官僚、贵族或城市统治者，但会影响社交评价、家庭声望和公共场合的关注度。
    - 年轻骑士、成年骑士和具有优秀骑乘控制能力的骑士，通常更容易成为学院、家庭和媒体关注对象。
  女骑等级:
    - 女骑机动等级越高，越容易受到社会尊敬。
    - 高级女骑代表更强的承载稳定、滑行能力、动力维持、道路任务资格和家庭荣誉。
    - A级、S级女骑在赛事、学院展示、公共任务和媒体内容中常被视为优秀典范。
    - 高等级女骑的声望来自能力与公共贡献，不等同于统治权或资源特权。
  无骑士家庭:
    - 没有孕育出男性的家庭数量较少，因此更容易被周围视为不够完整，尽管它们不会失去住房、信用点、教育或医疗资源。
    - 这类家庭会遭遇柔性歧视，如邻里评价、学院闲谈、家庭档案备注、婚配印象和公共排班时的默认判断。
    - 已从学院毕业且无原生绑定的女性，更常参与公共女骑排班，被社会视为对公共骑乘体系的必要补足。
    - 相关评价通常以温和、理所当然或礼貌化的方式出现，很少表现成公开惩罚。
