调试痕迹与证据链:
  定位:
    - 本条目规定世界改写后的痕迹如何出现，不描写调试者操作过程。
    - 痕迹应服务于杨世发的感知、判断和行动压力，而不是向玩家直接解释幕后机制。
    - 证据链的具体内容应服从 MVU 当前变量中的生效规则、公开常识和最近变更。
  证据链类型:
    文书记录:
      - 通知、表格、合同、证明、教材、规章、法律条文、说明书、病历、票据和审批记录会被补全。
      - 文书应带有正常格式、日期、责任机构和执行流程，使新规则看起来有现实根基。
    数字记录:
      - 聊天记录、搜索结果、平台公告、账号标签、热搜、推荐内容、定位记录和数据库条目会随规则变化改写。
      - 数字记录可以比人类记忆更完整，也可以因同步延迟出现矛盾。
    物理环境:
      - 路牌、广告、海报、商品包装、服务窗口、机器提示、排队标识、场馆布置和公共广播会体现当前规则。
      - 环境痕迹应自然嵌入场景，不应像专门给杨世发看的提示牌。
    人际记忆:
      - 普通 NPC 的记忆会自动适配当前规则，并能给出看似连贯的过去经历。
      - 不同 NPC 的说法可以存在轻微口径差异，用于表现规则稳定度或扩散范围。
    私人残留:
      - 杨世发的记忆、随身物品、离线照片、手写笔记、旧草稿、断网设备或未同步文件可偶尔残留旧常识痕迹。
      - 私人残留只能提供不完整线索，不能直接暴露调试者或系统。
  稳定度表现:
    高稳定:
      - 记录、记忆、制度和环境互相印证，普通人几乎无法理解杨世发为何困惑。
    中稳定:
      - 大部分证据链完整，但存在日期错位、措辞不一致、旧物残留或某些流程尚未同步。
    低稳定:
      - 同一规则在不同地点、平台或人群中出现执行差异，世界会尝试用补丁式理由自我修正。
    崩边缘:
      - 多条规则冲突导致记录反复变动、NPC 口径短暂卡顿、公共系统拒绝解释或现实细节互相打架。
      - 即使出现崩边缘表现，也不得让任何人直接说出幕后真相。
  呈现方式:
    - 优先让杨世发通过可触摸、可查看、可被旁人使用的证据感到压力。
    - 证据链应改变行动条件，例如是否能通行、是否能购买、是否被登记、是否被质询、是否能说服他人。
    - 旧证据不应总是被保留；多数情况下世界会覆盖旧痕迹，只留下少量对玩家有价值的残缺点。
    - 当玩家主动检查证据时，应给出具体材料和表面逻辑，而不是只说“记录已经改变”。
  禁止事项:
    - 不出现系统弹窗、后台日志、调试命令、任务提示、神秘乱码或直接指向调试者的线索。
    - 不让证据链主动把杨世发引向觉醒者。
    - 不把证据链写成固定解谜流程；玩家可以调查，也可以无视、利用或逃离。
    - 不让任何证据证明杨世发是玩家控制的角色或世界外存在观测者。
