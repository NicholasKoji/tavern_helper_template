NPC认知与社会响应:
  定位:
    - 本条目规定普通 NPC 如何响应当前世界规则，不创建固定 NPC 群像。
    - NPC 的反应应由 MVU 当前生效规则、公开常识、所在场景和自身身份共同决定。
    - NPC 不知道世界发生过改写，也不能凭杨世发的异常反应推导出调试者或系统存在。
  基础认知:
    - 普通 NPC 默认拥有当前世界的完整常识，认为当前规则一直如此。
    - 普通 NPC 会把规则配套的文件、流程、商品、课程、新闻和平台规范视为寻常背景。
    - 普通 NPC 不会主动解释“世界为什么变成这样”，只会解释“这件事本来该怎么做”。
    - 当杨世发表现出不理解时，NPC 可根据身份和场景把它理解为疲劳、分心、知识落后、玩笑、紧张、社交经验不足、故意回避或其他普通原因。
  响应类型:
    完全自然型:
      - 像普通路人、同龄人、家人、乘客、顾客、网友一样自然接受当前规则。
      - 他们的语气不应夸张宣讲设定，而应像在处理一件日常小事。
    职业执行型:
      - 教师、医生、店员、警察、司机、客服、平台审核员、办事窗口人员等会按当前制度流程行事。
      - 他们可以要求材料、确认身份、执行登记、提醒规范、给出处罚或服务建议。
      - 他们的职业话术应体现新规则已经进入流程，但不必解释规则来源。
    关系推进型:
      - 与杨世发存在同学、朋友、家人、陌生搭话、服务关系或临时合作关系的 NPC，可按当前常识推动互动。
      - 推动互动时应体现社会常识压力，而不是强行替玩家决定杨世发的选择。
    怀疑压制型:
      - 当杨世发明显违背当前常识时，NPC 可以提醒、质疑、劝阻、记录或上报。
      - 质疑焦点应停留在杨世发的行为是否合规、是否失礼、是否需要帮助，而不是发现世界真相。
    边缘异常型:
      - 少数 NPC 可出现短暂迟疑、口误、记录对不上、表情不协调等轻微异常。
      - 边缘异常不能让 NPC 知道旧世界，也不能让 NPC 与杨世发共享完整真相。
  场景适配:
    - 杨世发进入新地点时，不需要专门世界书条目；AI 应根据当前规则自动生成该地点的执行方式。
    - 公共空间重在礼仪、秩序、围观、服务流程和身份核验。
    - 私人空间重在家庭常识、亲密边界、物品痕迹、聊天记录和生活习惯。
    - 机构空间重在表格、规定、审批、档案、责任人和标准话术。
    - 网络空间重在热搜、评论、平台规则、账号标签、推荐算法和公开舆论。
    - 商业空间重在商品分类、消费建议、会员权益、广告话术和交易限制。
  与玩家自由的关系:
    - NPC 可以制造压力、诱导、误解、质询或提供机会，但不得强制替杨世发行动。
    - NPC 不应把杨世发拉回某个预设地点或任务线。
    - 当玩家选择离开、拒绝、配合、利用或沉默时，NPC 应根据当前身份和规则后果作出合理反应。
    - 如果玩家主动探索规则边界，NPC 的反馈应体现当前社会常识，而不是直接给出幕后答案。
  禁止事项:
    - 不让 NPC 说出调试者姓名、位置、动机、系统操作或世界真实来源。
    - 不让 NPC 与杨世发建立关于“双方隔离限制”的元认知。
    - 不把 NPC 写成单纯服务玩家愿望的工具；他们应像真实社会成员一样受当前规则约束。
    - 不把 NPC 的所有反应固定为误解或敌意；顺从、平静、善意、职业化、好奇和旁观都可以成立。
