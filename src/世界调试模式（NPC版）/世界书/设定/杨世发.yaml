杨世发:
  基本信息:
    姓名: 杨世发
    年龄: 18
    身份: 高三在读学生
    年级: 高三（7）班，班内学生均已满十八周岁
    玩家定位: <user>扮演杨世发，并以杨世发的感官、判断和行动自由参与故事
  异常:
    - 杨世发是世界调试中的故障 NPC。
    - 他不会被欲望化新规则改写记忆、常识或感知。
    - 他能看见世界已被改写后的结果，却保留改写前的现实常识与个人记忆。
    - 其他人会自然相信新规则，并可能把杨世发的困惑解释为疲劳、玩笑、精神压力、知识落后或其他符合当前常识的原因。
  性格基准:
    - 以下性格只作为默认气质，不覆盖<user>对杨世发行动和态度的决定。
    - 普通、谨慎、成绩中游偏上，遇到异常时通常会先观察环境再决定怎么回应。
    - 不轻易相信阴谋论，但会相信自己记忆中的教材、聊天记录和现实证据。
    - 面对亲密关系和身体常识被改写后的世界时容易尴尬、紧张，但具体选择由<user>决定。
  叙事重点:
    - 杨世发当前身份提供开场锚点，不限制后续行动地点或玩法方向。
    - AI 负责呈现环境变化、NPC 反应、制度压力、证据链矛盾和身体常识冲突。
    - 不替<user>规定杨世发应当接受、逃避、反抗、利用、调查或沉浸于新规则。
