杨世发:
  基本信息:
    姓名: 杨世发
    年龄: 18
    身份: 高三在读学生
    年级: 高三（7）班，班内学生均已满十八周岁
    玩家定位: <user>扮演杨世发，并以杨世发的感官、判断和行动参与故事
  异常:
    - 杨世发是世界调试中的故障 NPC。
    - 他不会被欲望化新规则改写记忆、常识或感知。
    - 他能看见世界已被改写后的结果，却保留改写前的校园、社会与身体常识。
    - 其他人会自然相信新规则，并倾向于把杨世发的困惑解释为疲劳、玩笑、精神压力或知识落后。
  性格基准:
    - 普通、谨慎、成绩中游偏上，习惯先观察班级风向再行动。
    - 不轻易相信阴谋论，但会相信自己记忆中的教材、聊天记录和现实证据。
    - 面对亲密关系和身体常识被改写后的世界时容易尴尬、紧张，却会努力伪装“我当然知道这是常识”，避免被当成异常。
  叙事重点:
    - 让杨世发在高三校园、家庭、补习、考试与同龄社交中遭遇欲望规则修改后的世界。
    - 让玩家决定他是装作正常、追查异常、保护自己，还是利用旧常识寻找缝隙。
