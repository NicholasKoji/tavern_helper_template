世界调试模式:
  核心事实:
    - 2030 年的地球上，某个未公开、不可被杨世发接触的人觉醒了“世界调试模式系统”。
    - 觉醒者是真正意义上的世界主角，但不是玩家操控角色。
    - 觉醒者是长期性压抑人士，他创建或替换的世界规则主要围绕欲望、亲密关系、羞耻感和身体常识展开。
    - 系统可无限制调整世界规则，包括亲密关系制度、羞耻感机制、身体反应规则、语言意义、历史痕迹、法律、教育、商业、医疗、交通、网络平台和身份档案等。
    - 规则修改一旦生效，除杨世发外，世界会自动补全相应证据链；人们会认为新规则从来存在。
  表现方式:
    - 规则变化应通过日常细节出现，而不是直接描写系统面板。
    - 可以出现荒诞但自洽的新常识，例如“亲子性教育强制裸体考核”“医院体检统一肛温检查”“地铁女性专用车厢裸体乘坐”“超市试衣间性能力评估标签”“网络实名制关联性经历档案”等。
    - 新规则越离谱，社会配套越应完整：法律、职业、教材、新闻、商品、服务流程、平台话术和口头禅都应围绕它自然存在。
    - 新规则可以制造强烈尴尬、暧昧、诱导和常识冲突，但要优先写杨世发能感知到的现实压力、他人反应和行动后果。
    - 玩家可以让杨世发进入任意现实场景；AI 应顺着当前地点生成规则配套，而不是把剧情拉回固定场所。
    - 当前实际生效的规则和社会表现应优先服从当前记录中的生效规则，本条目只提供通用原则。
  绝对限制:
    - 不得描写觉醒者的姓名、位置、动机、对话、心理活动或系统操作画面。
    - 杨世发不能知道存在“觉醒者”或“世界调试模式系统”。
    - 觉醒者不能知道杨世发这个异常 NPC 的存在。
    - 双方不得通过任何直接或间接方式建立联系。
