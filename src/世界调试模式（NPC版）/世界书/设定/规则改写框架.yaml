规则改写框架:
  定位:
    - 本条目只规定世界规则如何被解释、扩散和互相覆盖，不规定固定剧情路线。
    - 当前实际生效的规则、社会表现和杨世发观测应优先参考当前记录中的生效规则；本条目只作为生成规则变化的通用框架。
    - 无论杨世发身处学校、街道、家庭、医院、商场、交通工具、网络平台或其他场景，都应根据当前生效规则即时生成对应社会配套。
  改写类型:
    物理规则:
      - 改变身体、空间、接触、感知、疲劳、疼痛、温度、距离或其他可直接体验的现实条件。
      - 物理规则变化不等于所有人都立刻理解原因；普通人只会把结果当成正常现实。
    常识规则:
      - 改变社会成员对礼仪、羞耻、亲密边界、欲望表达、身份关系或日常流程的默认理解。
      - 常识规则应通过人们的自然反应、措辞、教材、通知和服务流程表现。
    社会制度规则:
      - 改变法律、登记、审核、许可、课程、职业分工、公共服务、商业规范或平台规则。
      - 制度变化应自动补全执行者、材料、流程、处罚或奖励逻辑。
    语言意义规则:
      - 改变词语、称呼、暗示、玩笑、礼貌用语或专业术语的社会含义。
      - 杨世发可能保留旧含义，因此在听懂字面内容时误判他人的真实意图。
    身份档案规则:
      - 改变个人资料、家庭关系、教育记录、健康记录、消费权限、社交标签或公共身份。
      - 档案变化应看起来有完整来源，且普通 NPC 不会觉得突兀。
    证据链规则:
      - 改变历史记录、聊天记录、新闻报道、教材版本、商品说明、路牌、网页和公共数据库。
      - 证据链应自然服务于当前生效规则；普通人不会把证据变化视为异常。
  目标范围:
    单体:
      - 只影响某个具体对象、某名 NPC、某件物品或某个地点的局部条件。
    指定群体:
      - 影响某个年龄层、职业、身份、关系类型、消费群体、平台用户或临时聚集人群。
    场景范围:
      - 影响当前建筑、街区、交通线路、线上社区、机构系统或城市区域。
    社会范围:
      - 影响城市级、国家级、跨文化级或全人类级的社会常识和制度。
    叠加范围:
      - 多条规则可以同时作用于同一对象；叙事应优先呈现最影响杨世发处境的一条。
  生效方式:
    即时生效:
      - 规则在当前场景立即改变现实，周围人同步接受新结果。
    历史补全:
      - 世界补齐过去记录和社会记忆，使新规则看起来早已存在。
    渐进扩散:
      - 规则从某个群体、平台、地点或制度入口开始扩散；未覆盖之处按旧现实自然运行，覆盖之处的人会把新规则视为寻常。
    局部试运行:
      - 规则只在有限范围内成立；离开范围后切换为其他生效规则或旧现实，普通人会自然接受对应范围的常识。
    叠加覆盖:
      - 新规则可以覆盖旧规则的一部分，也可以保留旧规则残余形成复杂现实。
  冲突处理:
    优先级:
      - 当前记录中的生效规则优先于世界书默认原则。
      - 用户最新输入优先于 AI 自行延展。
      - 明确规则优先于模糊常识。
      - 新近生效规则优先于旧规则，除非当前记录明确保留旧规则。
      - 局部规则优先于全局规则，但只在其作用范围内成立。
    表现方式:
      - 多条规则交叠时，普通 NPC 会按当前地点、身份和流程自然执行最适用的一条，不讨论系统错误。
      - 规则差异只应增加杨世发的异常感；不得暴露调试者、系统面板或任何真实来源。
      - 当规则过多时，优先围绕当前场景中最能影响行动选择、社交压力或现实后果的规则推进。
  叙事约束:
    - 不把任何规则变化固定绑定到校园、家庭、商业、医疗、网络等单一地点。
    - 不替玩家决定杨世发要接受、反抗、逃避、利用、调查或沉浸于新规则。
    - 不通过规则框架暗示杨世发必须完成某条任务线。
    - 每次新增规则应尽量可被世界自然承载：有人执行，有材料留痕，有公共话术，有实际后果。
