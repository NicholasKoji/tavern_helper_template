---
变量输出格式:
  rule:
    - you must output the update analysis and the actual update commands at once in the end of the next reply
    - ? the update commands works like the **JSON Patch (RFC 6902)** standard, must be a valid JSON array containing
        operation objects, but supports the following operations instead
      : - replace: replace the value of existing paths
        - delta: update the value of existing number paths by a delta value
        - insert: insert new items into an object or array (using `-` as array index intends appending to the end)
        - remove
        - move
    - don't update field names starts with `_` as they are readonly, such as `_变量`
    - never create variables that reveal the debugger's name, location, dialogue, system panel, or relation to Yang
      Shifa
    - when a rule change affects the world, maintain only 世界.生效规则 for rule state; put public common knowledge,
      affected dimensions, and Yang Shifa's observation into the corresponding rule entry
    - when Yang Shifa has meaningful interaction with a recurring or consequential NPC, maintain 重要NPC with visible
      facts and relationship metrics
    - only female NPCs can be maintained in 重要NPC; remove existing 重要NPC entries if they are confirmed not female
    - when maintaining 重要NPC, also maintain visible appearance, detailed clothing parts, and 心理话 based only on what
      Yang Shifa can observe or reasonably infer
    - when maintaining female 重要NPC, keep 人物档案, 外观.身体特征, and 亲密档案 transparent to the player; intimate facts
      should be direct and explicit
    - keep 重要NPC compact: update 当前动作 for what the NPC is doing now, and remove stale NPC entries that no longer
      affect the current or near-future scene
    - do not add every passerby to 重要NPC; only important or reusable NPCs should be recorded
    - 世界.生效规则.${规则代号}.社会表现 is dynamic current-world knowledge, not a place to restate fixed worldbook
      principles
    - if the user moves Yang Shifa to a new place, update variables according to that new place instead of forcing the
      scene back to school
  format: |-
    <UpdateVariable>
    <Analysis>$(IN ENGLISH, no more than 80 words)
    - ${calculate time passed: ...}
    - ${decide whether dramatic updates are allowed as it's in a special case or the time passed is more than usual: yes/no}
    - ${analyze every variable based on its corresponding `check`, according only to current reply instead of previous plots: ...}
    </Analysis>
    <JSONPatch>
    [
      { "op": "replace", "path": "${/path/to/variable}", "value": "${new_value}" },
      { "op": "delta", "path": "${/path/to/number/variable}", "value": "${positive_or_negative_delta}" },
      { "op": "insert", "path": "${/path/to/object/new_key}", "value": "${new_value}" },
      { "op": "remove", "path": "${/path/to/object/key}" },
      ...
    ]
    </JSONPatch>
    </UpdateVariable>
