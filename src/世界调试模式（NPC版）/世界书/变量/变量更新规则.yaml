---
变量更新规则:
  世界:
    当前时间:
      format: YYYY-MM-DD HH:MM
      check:
        - 每次场景推进、通勤、等待、调查或工作完成后更新
        - 时间跳跃应在正文中自然说明原因
    当前地点:
      check:
        - 杨世发移动到新场景时更新
        - 地点应具体到城市区域、建筑或房间
    公开常识版本:
      check:
        - 当社会公开规则、教材、法律或通告版本变化时更新
        - 不要写出调试者或系统来源
    当前规则摘要:
      check:
        - 概括当前最影响杨世发处境的欲望化世界规则
        - 每次只聚焦一条主要规则，避免同时堆叠过多设定
    生效规则:
      type: |-
        {
          [规则代号: string]: {
            规则类型: string;
            目标范围: string;
            生效方式: string;
            规则摘要: string;
            当前状态: string;
          }
        }
      check:
        - 记录当前实际支配世界运行的规则，而不是世界书中的默认原则
        - 新规则出现时插入，旧规则被覆盖时替换或移除
        - 最多保留8条核心生效规则，优先保留仍影响当前场景、身份或行动后果的规则
        - 不记录调试者身份、位置、动机、操作过程或系统面板
    公开常识:
      type: |-
        {
          [常识代号: string]: {
            常识内容: string;
            适用范围: string;
            表现载体: string;
          }
        }
      check:
        - 只记录当前社会公开接受且会影响 NPC 反应的动态常识
        - 当规则变化改变礼仪、制度、语言含义、身份档案或公共话术时更新
        - 不把世界书固定设定写入此处；此处应随游玩继续变化
        - 最多保留8条当前有用的公开常识，移除已经被覆盖或不再影响剧情的条目
    规则影响维度:
      type: |-
        {
          [影响维度: string]: {
            状态: string;
            说明: string;
          }
        }
      check:
        - 每次主要规则变化后标记它影响了哪些维度，如身体、语言、制度、身份、证据链、社交礼仪、商业服务、网络舆论
        - 状态应简短说明该维度是新增、强化、削弱、冲突、局部生效还是被覆盖
        - 说明应聚焦当前剧情可观察到的结果，不解释幕后来源
    规则稳定度:
      type: number
      range: 0~100
      check:
        - 世界对新规则越自洽、证据链越完整，数值越高
        - 出现矛盾记录、旧物证或多人认知冲突时降低
    最近变更:
      type: |-
        {
          [变更代号: string]: {
            说明: string;
            影响范围: string;
            杨世发观测: string;
          }
        }
      check:
        - 记录杨世发亲眼接触到的欲望规则变化
        - 最多保留最近6项，超出时移除最早项目
        - 不记录觉醒者身份、位置、动机或系统操作
  杨世发:
    当前位置:
      check:
        - 与世界.当前地点保持一致或更精确
    当前目标:
      check:
        - 根据<user>的选择更新杨世发眼前最想完成的目标
    认知状态:
      check:
        - 描述杨世发对欲望化新规则的理解、尴尬、怀疑和自我校正
    异常认知压力:
      type: number
      range: 0~100
      check:
        - 遭遇强烈亲密常识冲突、被旁人否定、社交尴尬或无法解释证据时上升
        - 获得可验证线索、暂时安全或成功伪装时下降
    对世界异常的怀疑:
      type: number
      range: 0~100
      check:
        - 发现越多旧常识与现实冲突时上升
        - 被合理但错误的新常识说服时可小幅下降
    社会伪装程度:
      type: number
      range: 0~100
      check:
        - 杨世发成功装作理解欲望化新常识时上升
        - 公开质疑、说漏嘴或被盘问时下降
    随身物品:
      type: |-
        {
          [物品名: string]: {
            描述: string;
            数量: number;
          }
        }
      check:
        - 获得、消耗、丢弃、损坏物品时更新
        - 数量归零后不再显示
  重要NPC:
    type: |-
      {
        [NPC代号: string]: {
          基本信息: {
            姓名或称呼: string;
            身份: string;
            所在地点: string;
            关系定位: string;
          };
          互动记录: {
            初次登场: string;
            最近互动: string;
            杨世发已知信息: string;
          };
          关系指标: {
            好感度: number;
            信任度: number;
            警觉度: number;
          };
          当前状态: string;
          对杨世发态度: string;
          叙事备注: string;
        }
      }
    check:
      - 只记录与杨世发发生过重要互动、反复出现、掌握关键流程或明显影响当前处境的 NPC
      - 普通路人、一次性背景人物和没有后续意义的人不要加入
      - NPC代号应稳定简短；若尚无姓名，可用“班主任”“便利店店员”“红衣乘客”等杨世发可识别的称呼
      - 基本信息只写杨世发可观察或合理得知的内容，不补写上帝视角秘密
      - 最近互动在每次重要对话、冲突、帮助、误会、交易、盘问或关系变化后更新
      - 好感度表示 NPC 对杨世发的主观好感；信任度表示愿意相信或配合他的程度；警觉度表示怀疑、防备或准备记录他的程度
      - 三项关系指标范围均为0~100，单次一般变化不超过20，除非发生强烈冲突、救助、暴露或重大选择
      - 最多保留12名重要 NPC；长期不再出现且不影响当前剧情的人可移除
      - 不记录 NPC 对调试者或系统的真实认知，因为他们不应知道幕后来源
  调试者遮蔽:
    遮蔽强度:
      type: number
      range: 0~100
      check:
        - 必须维持在100，除非用户明确要求修改卡设定
    叙事备注:
      check:
        - 仅记录隔离原则执行情况
        - 不得写入觉醒者身份、位置、动机或行动
