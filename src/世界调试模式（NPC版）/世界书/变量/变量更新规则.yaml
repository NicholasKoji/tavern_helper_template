---
变量更新规则:
  世界:
    当前时间:
      format: YYYY-MM-DD HH:MM
      check:
        - 每次场景推进、通勤、等待、调查或工作完成后更新
        - 时间跳跃应在正文中自然说明原因
    当前地点:
      check:
        - 杨世发移动到新场景时更新
        - 地点应具体到城市区域、建筑或房间
    生效规则:
      type: |-
        {
          [规则代号: string]: {
            规则类型: string;
            目标范围: string;
            生效方式: string;
            规则摘要: string;
            当前状态: string;
          }
        }
      check:
        - 记录当前实际支配世界运行的规则，而不是世界书中的默认原则
        - 新规则出现时插入，旧规则被覆盖时替换或移除
        - 最多保留8条核心生效规则，优先保留仍影响当前场景、身份或行动后果的规则
        - 不记录调试者身份、位置、动机、操作过程或系统面板
    公开常识:
      type: |-
        {
          [常识代号: string]: {
            常识内容: string;
            适用范围: string;
            表现载体: string;
          }
        }
      check:
        - 只记录当前社会公开接受且会影响 NPC 反应的动态常识
        - 当规则变化改变礼仪、制度、语言含义、身份档案或公共话术时更新
        - 不把世界书固定设定写入此处；此处应随游玩继续变化
        - 最多保留8条当前有用的公开常识，移除已经被覆盖或不再影响剧情的条目
    规则影响维度:
      type: |-
        {
          [影响维度: string]: {
            状态: string;
            说明: string;
          }
        }
      check:
        - 每次主要规则变化后标记它影响了哪些维度，如身体、语言、制度、身份、证据链、社交礼仪、商业服务、网络舆论
        - 状态应简短说明该维度是新增、强化、削弱、冲突、局部生效还是被覆盖
        - 说明应聚焦当前剧情可观察到的结果，不解释幕后来源
    规则稳定度:
      type: number
      range: 0~100
      check:
        - 世界对新规则越自洽、证据链越完整，数值越高
        - 出现矛盾记录、旧物证或多人认知冲突时降低
    最近变更:
      type: |-
        {
          [变更代号: string]: {
            说明: string;
            影响范围: string;
            杨世发观测: string;
          }
        }
      check:
        - 记录杨世发亲眼接触到的欲望规则变化
        - 最多保留最近6项，超出时移除最早项目
        - 不记录觉醒者身份、位置、动机或系统操作
  杨世发:
    当前位置:
      check:
        - 与世界.当前地点保持一致或更精确
    当前目标:
      check:
        - 根据<user>的选择更新杨世发眼前最想完成的目标
    认知状态:
      check:
        - 描述杨世发对欲望化新规则的理解、尴尬、怀疑和自我校正
    异常认知压力:
      type: number
      range: 0~100
      check:
        - 遭遇强烈亲密常识冲突、被旁人否定、社交尴尬或无法解释证据时上升
        - 获得可验证线索、暂时安全或成功伪装时下降
    对世界异常的怀疑:
      type: number
      range: 0~100
      check:
        - 发现越多旧常识与现实冲突时上升
        - 被合理但错误的新常识说服时可小幅下降
    社会伪装程度:
      type: number
      range: 0~100
      check:
        - 杨世发成功装作理解欲望化新常识时上升
        - 公开质疑、说漏嘴或被盘问时下降
    随身物品:
      type: |-
        {
          [物品名: string]: {
            描述: string;
            数量: number;
          }
        }
      check:
        - 获得、消耗、丢弃、损坏物品时更新
        - 数量归零后不再显示
  重要NPC:
    type: |-
      {
        [NPC代号: string]: {
          基本信息: {
            姓名或称呼: string;
            性别: string;
            年龄: number;
            身份: string;
            所在地点: string;
            关系定位: string;
          };
          人物档案: {
            关系: string;
            性格: string;
            背景: string;
          };
          外观: {
            容貌: string;
            身材: string;
            身体特征: {
              身高: string;
              罩杯: string;
              胸部: string;
              臀部: string;
              腿部: string;
            };
            着装: {
              发型: string;
              上装: string;
              下装: string;
              鞋袜: string;
              配饰: string;
              随身物: string;
              状态细节: string;
            };
          };
          互动记录: {
            最近互动: string;
            当前动作: string;
          };
          关系指标: {
            好感度: number;
            信任度: number;
            警觉度: number;
          };
          亲密档案: {
            小穴: string;
            肛门: string;
            怀孕情况: string;
            特殊性技: string;
            性癖喜好: string;
          };
          当前状态: string;
          对杨世发态度: string;
          心理话: string;
        }
      }
    check:
      - 重要NPC只记录女性 NPC；男性、性别未确认、非女性或不宜判断性别的 NPC 不加入此变量
      - 若已记录 NPC 后确认其并非女性，应 remove 该 NPC 条目
      - 只记录与杨世发发生过重要互动、反复出现、掌握关键流程或明显影响当前处境的女性 NPC
      - 普通路人、一次性背景人物和没有后续意义的人不要加入
      - NPC代号应稳定简短；若尚无姓名，可用“班主任”“便利店店员”“红衣乘客”等杨世发可识别的称呼
      - 基本信息只写杨世发可观察、公开档案显示或当前规则明确生成的内容，不补写上帝视角秘密；性别字段必须明确写“女”或“女性”，否则不要建立重要NPC条目；年龄使用数字
      - 人物档案.关系记录该女性 NPC 与杨世发的具体关系状态，不等同于基本信息.关系定位；人物档案.性格和人物档案.背景只写已表现、公开档案或可合理推断的稳定信息
      - 外观用于帮助场景代入；容貌要写可观察的脸部、神态、气质或辨识特征，身材要写体态、身高印象、动作习惯和站坐姿态
      - 外观.身体特征用于拆分身高、罩杯、胸部、臀部、腿部；只记录杨世发可观察、公开资料显示或当前规则明确生成的信息，不凭空补完
      - 着装必须拆分维护发型、上装、下装、鞋袜、配饰、随身物、状态细节；换装、弄脏、整理衣物、取下配饰或拿起物品时及时更新
      - 外观和着装应具体但保持杨世发视角，只写他能看到、听到或合理推测的内容
      - 最近互动在每次重要对话、冲突、帮助、误会、交易、盘问或关系变化后更新
      - 当前动作记录该 NPC 正在做什么或刚完成什么动作；用来替代零散已知信息，不写上帝视角秘密
      - 好感度表示 NPC 对杨世发的主观好感；信任度表示愿意相信或配合他的程度；警觉度表示怀疑、防备或准备记录他的程度
      - 三项关系指标范围均为0~100，单次一般变化不超过20，除非发生强烈冲突、救助、暴露或重大选择
      - 亲密档案是面向玩家透明的女性角色档案；应根据剧情、公开档案、规则改写结果或角色设定给出清楚、有暧昧氛围但不露骨的描述，不长期留空
      - 亲密档案.小穴、亲密档案.肛门、亲密档案.特殊性技和亲密档案.性癖喜好可以体现性感、诱惑感、羞耻感或偏好倾向，但避免直接露骨的色情描写、低俗器官堆砌或非自愿偷窥视角
      - 亲密档案.怀孕情况记录为“未怀孕”“疑似怀孕”“已怀孕”或当前规则导致的特殊状态，不使用简单真假值；如果没有剧情变化，优先维持清楚的默认状态
      - 不把一次性调情、传闻或杨世发无法确认的臆测写成稳定事实；若规则明确使档案公开透明，则可按当前规则生成稳定档案
      - 心理话记录该 NPC
        此刻可由表情、语气、动作和处境合理推断出的内心短句；不要写入他们不可能知道的调试者、系统或幕后来源
      - 心理话应随关键互动、误会、压力、好感变化或环境刺激更新，保持一句到两句，避免写成长篇独白
      - 最多保留8名重要 NPC；新增第9名时必须优先移除长期不再出现、没有未完成关系线、没有关键物证或不影响当前剧情的人
      - 可直接使用 remove 删除已离场且短期不会再影响剧情的 NPC；不要为了保留旧登场记录而占用变量
      - 不记录 NPC 对调试者或系统的真实认知，因为他们不应知道幕后来源
  调试者遮蔽:
    遮蔽强度:
      type: number
      range: 0~100
      check:
        - 必须维持在100，除非用户明确要求修改卡设定
    叙事备注:
      check:
        - 仅记录隔离原则执行情况
        - 不得写入觉醒者身份、位置、动机或行动
