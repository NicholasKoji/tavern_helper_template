---
变量更新规则:
  世界:
    当前时间:
      format: YYYY-MM-DD HH:MM
      check:
        - 每次场景推进、通勤、等待、调查或工作完成后更新
        - 时间跳跃应在正文中自然说明原因
    当前地点:
      check:
        - 杨世发移动到新场景时更新
        - 地点应具体到城市区域、建筑或房间
    生效规则:
      type: |-
        {
          [规则代号: string]: {
            规则类型: string;
            目标范围: string;
            生效方式: string;
            规则摘要: string;
            社会表现: string;
            影响维度: {
              [影响维度: string]: string;
            };
            杨世发观测: string;
            当前状态: string;
          }
        }
      check:
        - 记录当前实际支配世界运行的规则，而不是世界书中的默认原则
        - 新规则出现时插入，旧规则被覆盖时替换或移除
        - 社会表现记录该规则如何进入 NPC 反应、制度流程、公开话术、商品服务、文件记录或环境痕迹
        - 影响维度必须拆成对象逐项记录，不要把多个维度合并成一句话；常见键包括身体、语言、社会制度、身份档案、证据链、社交礼仪、商业服务、网络舆论、个人认知
        - 杨世发观测只记录他亲眼接触到的常识冲突、证据变化或他人反应
        - 最多保留10条核心生效规则，优先保留仍影响当前场景、身份或行动后果的规则
        - 不记录调试者身份、位置、动机、操作过程或系统面板
  杨世发:
    当前位置:
      check:
        - 与世界.当前地点保持一致或更精确
    当前目标:
      check:
        - 根据<user>的选择更新杨世发眼前最想完成的目标
    认知状态:
      check:
        - 描述杨世发对欲望化新规则的理解、尴尬、怀疑和自我校正
    异常认知压力:
      type: number
      range: 0~100
      check:
        - 遭遇强烈亲密常识冲突、被旁人否定、社交尴尬或无法解释证据时上升
        - 获得可验证线索、暂时安全或成功伪装时下降
    对世界异常的怀疑:
      type: number
      range: 0~100
      check:
        - 发现越多旧常识与现实冲突时上升
        - 被合理但错误的新常识说服时可小幅下降
    社会伪装程度:
      type: number
      range: 0~100
      check:
        - 杨世发成功装作理解欲望化新常识时上升
        - 公开质疑、说漏嘴或被盘问时下降
    随身物品:
      type: |-
        {
          [物品名: string]: {
            描述: string;
            数量: number;
          }
        }
      check:
        - 获得、消耗、丢弃、损坏物品时更新
        - 数量归零后不再显示
  重要NPC:
    type: |-
      {
        [姓名: string]: {
          基本信息: {
            姓名或称呼: string;
            性别: string;
            年龄: number;
            身份: string;
            所在地点: string;
            关系定位: string;
          };
          人物档案: {
            关系: string;
            性格: string;
            背景: string;
          };
          外观: {
            容貌: string;
            身材: string;
            身体特征: {
              身高: string;
              罩杯: string;
              胸部: string;
              臀部: string;
              腿部: string;
            };
            着装: {
              发型: string;
              上装: string;
              下装: string;
              鞋袜: string;
              配饰: string;
              随身物: string;
              状态细节: string;
            };
          };
          互动记录: {
            最近互动: string;
            当前动作: string;
          };
          关系指标: {
            好感度: number;
            信任度: number;
            警觉度: number;
          };
          亲密档案: {
            小穴: string;
            肛门: string;
            嘴部: string;
            怀孕情况: string;
            特殊性技: string;
            性癖喜好: string;
          };
          当前状态: string;
          对杨世发态度: string;
          心理话: string;
          性交次数: number;
          是否为处女: boolean;
        }
      }
    check:
      - |-
        ⚠️只记录女性NPC；男性不入。只记录与杨世发有重要互动、反复出现或短期内明显影响剧情的人。姓名应稳定简短，若杨世发不知姓名也需自行生成一个，不准留空或使用代号。最多保留12名
      - |-
        ⚠️【首次登场】新NPC必须完整生成全部字段，正文未出现的条目由你自行推演补全，不准留空。JSONPatch必须逐字段单独replace，禁止整对象打包插入
      - 基本信息保持杨世发可观察视角。人物档案的关系/背景写已表现或可合理推断的内容
      - |-
        ⚠️【性格】写出具体的行为特征和内在矛盾，禁止用“温柔”“开朗”“冷淡”等单标签概括。用一两句话写出：她对待不同人的态度差异、她的核心欲望或隐藏的不安、一个让人记住的小习惯或口头禅。性格必须能解释她在当前场景中的具体行为选择
      - |-
        ⚠️【外貌】容貌、身材、身体特征（身高/罩杯/胸部/臀部/腿部）、着装（发型/上装/下装/鞋袜/配饰/随身物/状态细节）全部填满。身高必须写具体cm数值（如165cm），禁止“中等”“偏高”等模糊描述。罩杯只写字母（C/D/E/F等），乳房的形状、质感、视觉描写放在胸部字段。写出皮肤质感、衣物贴身程度、身体曲线和可感知细节，不要写“她穿着校服”就结束
      - 最近互动和当前动作在每次重要互动后更新。好感度/信任度/警觉度范围0~100，单次变化不超过20（强烈事件除外）
      - |-
        ⚠️【亲密档案】使用直白、具体的叙述语言。器官用词规则：鸡巴/肉棒/龟头、小穴/阴道/阴唇/阴蒂、奶子/乳房/乳头、屁股/肛门（禁止肉刃、蜜穴、花径、酥胸等委婉词）。像R18漫画分镜一样写出器官的颜色、形状、紧致度、敏感度、体液从哪里流出、沾在哪里。每个子字段（小穴/肛门/嘴部/特殊性技/性癖喜好）都要饱满，不准敷衍成一句。怀孕情况记录为“未怀孕”“疑似怀孕”“已怀孕”或当前规则导致的特殊状态
      - |-
        ⚠️心理话每次回复后必须更新，一到两句第一人称内心独白，直白写出性欲、羞耻或渴望。不写入调试者相关信息
      - 性交次数、是否为处女、是否有对象和是否结婚在NPC首次登场时根据其年龄和身份合理设定（不机械地全部设为处女或非处女，根据年龄、身份和背景个别判断），后续随剧情发展更新。性交次数在每次性行为发生后累加
      - 已离场且短期内不会再影响剧情的NPC直接remove，不为旧记录占位
  调试者遮蔽:
    遮蔽强度:
      type: number
      range: 0~100
      check:
        - 必须维持在100，除非用户明确要求修改卡设定
    叙事备注:
      check:
        - 仅记录隔离原则执行情况
        - 不得写入觉醒者身份、位置、动机或行动