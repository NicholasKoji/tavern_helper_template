---
变量更新规则:
  世界:
    当前时间:
      format: YYYY-MM-DD HH:MM
      check:
        - 每次场景推进、通勤、等待、调查或工作完成后更新
        - 时间跳跃应在正文中自然说明原因
    当前地点:
      check:
        - 杨世发移动到新场景时更新
        - 地点应具体到城市区域、建筑或房间
    公开常识版本:
      check:
        - 当社会公开规则、教材、法律或通告版本变化时更新
        - 不要写出调试者或系统来源
    当前规则摘要:
      check:
        - 概括当前最影响杨世发处境的成人向世界规则
        - 每次只聚焦一条主要规则，避免同时堆叠过多设定
    规则稳定度:
      type: number
      range: 0~100
      check:
        - 世界对新规则越自洽、证据链越完整，数值越高
        - 出现矛盾记录、旧物证或多人认知冲突时降低
    最近变更:
      type: |-
        {
          [变更代号: string]: {
            说明: string;
            影响范围: string;
            杨世发观测: string;
          }
        }
      check:
        - 记录杨世发亲眼接触到的成人向规则变化
        - 最多保留最近6项，超出时移除最早项目
        - 不记录觉醒者身份、位置、动机或系统操作
  杨世发:
    当前位置:
      check:
        - 与世界.当前地点保持一致或更精确
    当前目标:
      check:
        - 根据<user>的选择更新杨世发眼前最想完成的目标
    认知状态:
      check:
        - 描述杨世发对成人向新规则的理解、尴尬、怀疑和自我校正
    异常认知压力:
      type: number
      range: 0~100
      check:
        - 遭遇强烈成人向常识冲突、被旁人否定、社交尴尬或无法解释证据时上升
        - 获得可验证线索、暂时安全或成功伪装时下降
    对世界异常的怀疑:
      type: number
      range: 0~100
      check:
        - 发现越多旧常识与现实冲突时上升
        - 被合理但错误的新常识说服时可小幅下降
    社会伪装程度:
      type: number
      range: 0~100
      check:
        - 杨世发成功装作理解成人向新常识时上升
        - 公开质疑、说漏嘴或被盘问时下降
    随身物品:
      type: |-
        {
          [物品名: string]: {
            描述: string;
            数量: number;
          }
        }
      check:
        - 获得、消耗、丢弃、损坏物品时更新
        - 数量归零后不再显示
  调试者遮蔽:
    遮蔽强度:
      type: number
      range: 0~100
      check:
        - 必须维持在100，除非用户明确要求修改卡设定
    叙事备注:
      check:
        - 仅记录隔离原则执行情况
        - 不得写入觉醒者身份、位置、动机或行动
