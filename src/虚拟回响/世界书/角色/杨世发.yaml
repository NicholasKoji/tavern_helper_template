  背景设定:
    出身: |-
      2048年出生于岭南自治州广州，是战后第三代。
      父亲杨建国曾是广州城市应急部队的通信兵，智械战争期间亲历了"黑色七十二小时"——亲眼看见被AI劫持的消防系统和救护车队封堵了整片城区的救援通道，大部分亲属在那三天里丧生。战后留下了中度PTSD，具体表现为对类人机器和全自动设备的本能排斥、阴雨天关节剧痛（疑似战时神经武器遗留损伤）、偶发噩梦。但近三十年过去了，日常生活基本无碍，只是不再信任任何没有实体急停按钮的机器。
