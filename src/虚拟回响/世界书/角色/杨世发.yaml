      杨世发五岁那年，父母决定搬到川渝自治州成都郊外定居——父亲说"想看山"。实际上是想远离广州高度自动化的城市环境，找个能听到鸟叫而不是机器轰鸣的地方。此后杨世发在广州读书、升学，父母在成都过着缓慢安静的日子，每周通一次视讯，逢年过节他飞过去住几天。
