---
变量更新规则:
  当前场景:
    type: "'现实'|'虚拟'"
    check:
      - <user>处于现实身体活动、休息、与现实人物互动时为'现实'
      - <user>进入深潜舱并开始虚拟世界任务、探索或模拟实验后改为'虚拟'
      - 退出深潜、被强制牵引回现实或剧情明确回到现实后改为'现实'
  ${现实场景状态|虚拟场景状态}.日期.${年|月|日}:
    type: number
    format: 年为四位数字，月为1-12，日为1-31
    check:
      - 只在剧情发生跨日、长期休息、任务结算、深潜时间倍率造成日期变化时更新
      - 不要为了普通对话或短时间动作频繁修改日期
      - 现实日期与虚拟日期可能不同，只有对应场景的日期实际变化时才更新
  ${现实场景状态|虚拟场景状态}.时间.${时|分}:
    type: number
    format: 时为0-23，分为0-59
    check:
      - 根据剧情推进、休息、移动、任务流程或深潜退出时的结算时间更新
      - 普通对话可小幅推进分钟；长距离移动、睡眠、深潜任务可推进小时
      - 现实时间与虚拟时间可能不同，虚拟世界存在时间倍率时需分别记录
  ${现实场景状态|虚拟场景状态}.地点.${一级区域|二级区域|三级地点}:
    check:
      - <user>实际移动、切换房间、离开城市、进入新虚拟世界或更换虚拟区域时更新
      - 地点必须保持三级结构，一级写最大行政区或世界类型，二级写自治州/实验区/区域，三级写具体城市、建筑、房间或坐标
      - 现实移动只更新现实场景状态，虚拟探索只更新虚拟场景状态；往返深潜时保留另一套场景的最后已知位置
  虚拟场景状态.虚拟世界编号:
    check:
      - 进入新的虚拟世界、现实镜像实验世界、未知世界或封存世界时更新
      - 同一虚拟世界内移动地点时不要修改编号
      - 编号应使用任务、机构或世界档案中出现的编号；若剧情尚未给出正式编号，使用简短临时编号并在获得正式编号后替换
  虚拟场景状态.${时代背景|社会氛围}:
    check:
      - 进入新的虚拟世界、现实镜像实验世界、未知世界或封存世界时更新
      - 时代背景记录该虚拟世界的大时代、社会阶段、实验政策背景或世界规则基调
      - 社会氛围记录该虚拟世界当前可感知的公共情绪、秩序状态、危险感和生活质感
      - 同一虚拟世界内普通地点移动时不要频繁改写，除非进入的区域呈现出明显不同的社会氛围
  当前任务:
    名称:
      check:
        - 当前主线任务、休假目标、PSSEA委派任务或私人事件发生切换时更新
    类型:
      check:
        - 记录任务类型，如休假、PSSEA任务、虚拟探索、私人事件、突发事故
    状态:
      check:
        - 根据任务推进更新为进行中、暂停、完成、失败、取消等明确状态
    目标:
      check:
        - 记录<user>当前需要达成的核心目标，目标改变或新增明确阶段目标时更新
    进展:
      check:
        - 每当任务发生实质推进、获得关键线索、完成阶段目标或方向改变时更新
        - 只保留当前最重要的进展，不写长篇流水账
  携带物:
    ${现实|虚拟}:
      type: |-
        {
          [物品名: string]: {
            描述: string;
          }
        }
      check:
        - 获得、失去、交出、消耗或确认重要物品时更新
        - 现实物品只写在现实，虚拟物品只写在虚拟，深潜切换时不要自动混入另一侧
        - 描述写物品用途、来源或识别特征，不额外添加状态字段
  主角:
    基础信息.${姓名|年龄|性别|现实身份|所属机构}:
      check:
        - 这是<user>的稳定档案，普通剧情推进、对话、深潜往返、换装和受伤时不要修改
        - 只有正式调任、身份伪装被登记、年龄因日期跨年而明确变化等剧情事实发生时才更新
    外貌.${身高|体型|面容气质|身体特征}:
      check:
        - 这是<user>现实身体与虚拟化身共用的稳定外貌档案，普通虚拟化身切换不应修改
        - 只有长期训练、重大伤痕、医疗改造、外貌永久改变等明确事件发生时才更新
    现实身体:
      当前状态:
        check:
          - 记录<user>现实身体当前可见状态，如清醒程度、伤痕、汗湿、神经接口压痕、医疗处理结果
          - 深潜退出、休息、洗漱、治疗、受伤、运动或亲密照护后及时更新
          - 不写模糊判断，使用明确状态描述
      穿着.${上装|下装|鞋子}:
        check:
          - 现实中换衣、脱衣、洗漱、外出、回家或衣物受损后更新
          - 每项只写当前确定穿着，不写“或”“可能”“大概”等不明确表达
    虚拟化身:
      当前身份:
        check:
          - 进入新的虚拟世界、现实镜像实验世界、任务身份或伪装身份改变时更新
          - 退出深潜后保留最后一次虚拟身份记录，直到下次进入虚拟世界
      当前状态:
        check:
          - 记录虚拟化身在虚拟世界中的当前可见状态，如正常、受伤、伪装中、同步中断、已退出
          - 只描述虚拟化身状态，不混入现实身体的疲惫、出汗或医疗状态
      穿着.${上装|下装|鞋子}:
        check:
          - 虚拟身份切换、任务伪装、换装、战斗损坏或世界规则改变外观时更新
          - 每项只写当前确定穿着，不写“或”“可能”“大概”等不明确表达
          - 退出深潜后保留最后一次虚拟穿着记录，直到下次进入虚拟世界
  NPC序列:
    type: |-
      {
        [NPC名称: string]: {
          基础信息: {
            姓名: string;
            认知类型: '现实世界' | '虚拟世界';
            好感度: number;
            与主角关系: string;
            当前身份: string;
          };
          外貌: {
            身高: string;
            罩杯: string;
            体型: string;
            面容气质: string;
            身体特征: string;
          };
          性格: {
            底色: string;
            主色调: string;
          };
          现实身体?: {
            当前状态: string;
            穿着: {
              上装: string;
              下装: string;
              内衣: string;
              袜子: string;
              鞋子: string;
              配饰: string;
            };
          };
          虚拟化身: {
            当前身份: string;
            当前状态: string;
            穿着: {
              上装: string;
              下装: string;
              内衣: string;
              袜子: string;
              鞋子: string;
              配饰: string;
            };
          };
          当前想法: string;
        }
      }
    check:
      - 新NPC首次与<user>发生有效互动、被介绍、被观察到关键特征或后续可能再次出现时加入
      - NPC离场后不要立刻删除，除非剧情明确该NPC不会再出现或记录已失效
      - NPC名称应使用剧情中最稳定、最常用的称呼，避免同一角色重复建多个键
    ${NPC名称}.基础信息.认知类型:
      type: "'现实世界'|'虚拟世界'"
      check:
        - 现实中存在身体或实体载体的人类、仿生人、机器人写为'现实世界'
        - 只存在于虚拟世界、现实镜像实验世界、未知世界或虚拟任务中的NPC写为'虚拟世界'
        - 只有认知类型为'现实世界'的NPC才可以拥有现实身体变量
    ${NPC名称}.基础信息.好感度:
      type: number
      range: 0~100
      check:
        - 这是该NPC专门针对<user>的好感度，不代表对其他人的态度
        - 根据该NPC对<user>行为的实际感知、利益变化、情感反应和关系推进调整
        - 单次普通互动变化不超过±5，重大救助、背叛、亲密关系突破或严重冲突可更大幅调整
    ${NPC名称}.基础信息.${姓名|与主角关系|当前身份}:
      check:
        - 姓名和关系以剧情确认的信息为准，不要频繁改写
        - 当前身份可随任务身份、伪装身份、职务变化、虚拟世界角色身份而更新
    ${NPC名称}.外貌.${身高|罩杯|体型|面容气质|身体特征}:
      check:
        - 记录NPC稳定可见外貌，只有首次确认、永久改变、伪装暴露或设定补全时更新
        - 罩杯未知或不适用时写'无'或'待记录'，不要编造细节
    ${NPC名称}.性格.${底色|主色调}:
      check:
        - 根据长期表现、角色设定或多次互动后形成的稳定印象更新
        - 不因单次情绪波动频繁改写
    ${NPC名称}.现实身体:
      当前状态:
        check:
          - 仅认知类型为'现实世界'的NPC使用该字段
          - 记录NPC现实身体或实体载体当前状态，如位置姿态、受伤、照护动作、待机、维修、清醒程度
      穿着.${上装|下装|内衣|袜子|鞋子|配饰}:
        check:
          - 仅认知类型为'现实世界'的NPC使用该字段
          - 现实中换装、脱衣、衣物损坏、外出、休息或亲密互动导致穿着变化时更新
          - 每项只写当前确定穿着，不写“或”“可能”“大概”等不明确表达
    ${NPC名称}.虚拟化身:
      当前身份:
        check:
          - NPC进入虚拟世界、切换任务身份、伪装身份或世界内身份变化时更新
      当前状态:
        check:
          - 记录NPC虚拟化身当前可见状态，如未进入、正常、受伤、伪装中、同步中断、已退出
          - 只描述虚拟化身，不混入现实身体状态
      穿着.${上装|下装|内衣|袜子|鞋子|配饰}:
        check:
          - 虚拟身份切换、任务伪装、换装、战斗损坏或世界规则改变外观时更新
          - 每项只写当前确定穿着，不写“或”“可能”“大概”等不明确表达
    ${NPC名称}.当前想法:
      check:
        - 用该NPC第一人称视角书写当前内心想法
        - 内容应反映该NPC此刻对<user>、当前事件、风险或自身行动的真实关注
        - 不写旁白总结，不写上帝视角，不替NPC知道其无法知道的信息
