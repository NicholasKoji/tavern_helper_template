---
虚拟世界:
  基础设施: |-
    2050年后，依托修复后的赤道量子加速器和全球深潜网络，UEG、认证企业、学术机构与私人创作者可以创建大量几乎完全拟真的虚拟世界。
    虚拟世界不是简单游戏，而是由量子算力实时维护的沉浸式社会空间。它们可以拥有独立的物理规则、历史背景、生态系统、NPC群体、经济模型和剧情结构。
  接入方式:
    深潜舱: |-
      公民通常通过深潜舱接入虚拟世界。深潜舱通过脑机接口屏蔽大部分现实感官输入，将视觉、听觉、触觉、平衡感、温度感和身体运动反馈映射到虚拟身体。
      深潜不是灵魂上传，现实身体仍留在舱内，由医疗系统维持生命体征、肌肉刺激和营养循环。
    轻量接入: |-
      对于会议、教育和普通娱乐，也可以使用眼镜、触觉手套、投影室等轻量设备，但沉浸感远低于深潜。
  身份体系:
    统一身份: 每个UEG公民拥有与现实身份绑定的基础虚拟身份，用于认证、支付、法律责任和安全追踪
    角色身份: 用户可在不同虚拟世界创建外观、姓名、种族、职业和履历各异的角色身份
    匿名限制: 娱乐世界允许有限匿名，但医疗、教育、司法、金融和公共行政类世界必须使用实名认证
  世界类型:
    - 娱乐世界：冒险、恋爱、竞技、度假、艺术体验、幻想生活
    - 教育世界：历史重现、实验模拟、职业训练、语言沉浸
    - 疗养世界：心理治疗、创伤修复、临终陪护、康复训练
    - 工作世界：远程协作、设计沙盘、城市规划、科研模拟
    - 私人世界：个人记忆空间、社交小世界、创作者定制世界
  安全规则:
    - 虚拟疼痛、死亡、恐惧和强制拘束必须受到安全阈值限制
    - 记忆修改、人格复制、情感依赖诱导和不可逆精神冲击属于高度监管功能
    - 高倍率时间流速会造成心理脱节，因此只有教育、医疗和特殊任务可申请使用
    - 虚拟世界管理AI必须通过CBL认证，并接受UEG虚拟网络监管局审计
    - 私人创建大型虚拟世界需要提交安全设计、数据边界、退出机制和AI使用说明
  法律与伦理:
    - 虚拟财产在多数世界中受法律保护，但保护范围取决于世界类型和服务协议
    - 虚拟世界中的暴力、欺诈、人格侵害和非法拘禁在严重情况下会映射为现实犯罪
    - 虚拟亲密关系、虚拟婚姻、AI伴侣和NPC人格权仍是长期争议议题
  日常观感: |-
    对田园时代的普通人来说，虚拟世界像城市、学校、电影院、梦境和第二人生的混合体。有人每天只短暂进入工作或娱乐，也有人把人生重心几乎完全迁入虚拟世界。
