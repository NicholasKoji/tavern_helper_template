---
文化共识:
  旧国家认同:
    定位: UEG宪法将旧国家认同界定为历史文化遗产，而非政治身份
    允许:
      - 庆祝旧国家传统节日
      - 使用旧国家语言
      - 为旧国家在战前的文化成就自豪
    禁止:
      - 恢复旧国家主权叙事
      - 使用旧国家旗帜、国歌、军队等主权象征进行政治动员
      - 公开宣扬旧国家主权论
    类比: 旧国家情感类似现代人对古罗马或唐朝的历史文化情感
  全球公民身份:
    身份: 所有人类统一登记为地球联合政府公民
    身份证标注:
      - 姓名
      - 出生日期
      - 行政区-自治州-市
      - 生物识别码
    护照: 已成为历史概念
    跨区域旅行: 跨自治州旅行无需通行证
  战争记忆:
    地位: 第三次世界大战是UEG合法性的基石
    教育: 全球教育体系内，“三战反思”是核心课程
    主流叙事: 1992-1998年的战争被视为旧国家体系无可避免的终点，和平统一被视为人类文明唯一正确的出路
