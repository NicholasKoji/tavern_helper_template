---
仿生人:
  定位: |-
    仿生人是CBL时代人工智能与机器人技术在人机陪伴、护理服务、亲密关系和虚拟探索协作场景中的最优形态。
    它们不是普通服务机器人，而是运行在心智边界栅格之内、拥有高拟真人格外壳和类人生理交互能力的合法高阶AI载体。
  出现背景: |-
    2045年智械战争结束后，公众对高阶AI和类人机器人长期保持恐惧，但战后社会同时存在大规模陪伴缺口、心理创伤、家庭破碎、失独与孤独问题。
    2050年CBL正式写入全球AI安全法后，UEG认为完全压制类人AI会阻碍社会重建，于是批准仿生人项目，以“可审计、可授权、可陪伴”为原则重新塑造人类与AI的关系。
  研发体系:
    委托方: UEG执行委员会与全球公共卫生、民政、虚拟网络监管部门
    科研机构:
      名称: 日内瓦认知安全研究院
      英文: Geneva Institute for Cognitive Security
      简称: GICS
      定位: UEG直属科研机构，CBL核心理论与审计标准的主要研发方
    企业承包方:
      名称: 赫利俄斯拟生科技集团
      英文: Helios Biosynthetic Systems
      简称: HBS
      定位: 田园时代最重要的仿生躯体、人格外壳、柔性神经材料和家庭陪伴AI供应商
  发展时间线:
    2050_CBL解禁: |-
      CBL公布后，UEG允许受认证AI重新进入医疗、护理、教育和家庭辅助领域，但禁止未经审计的高拟真人形机器人商业化。
    2051_2054_试点阶段: |-
      GICS与HBS推出第一批护理型、辅助型和心理陪伴型仿生人试点，用于战后创伤康复、独居老人照护、孤儿院辅助教育和深潜疗养中心陪护。
    2055_拟感突破: |-
      HBS公布“全域拟感闭环技术”（Total Sensorial Embodiment Loop, TSEL）。
      TSEL将触觉、温度、压力、疼痛阈值、嗅觉、味觉、平衡感和本体感受接入统一身体模型，使仿生人不只是在模拟人类反应，而是能以受限、可审计的方式形成接近人类的身体感知经验。
    2056_商业普及: |-
      UEG开放民用仿生人定制许可。辅助型仿生人进入家庭服务、康复陪护、教育辅助和探索后勤领域；伴侣型仿生人在更严格的成年人身份、亲密同意协议和隐私审计下获得合法销售许可。
  类型:
    辅助型仿生人:
      特征: 默认无性器特征，外观可拟真但会保留更明确的服务设备识别边界
      用途:
        - 起居照料
        - 医疗康复辅助
        - 家庭管理
        - 情绪陪伴
        - 儿童与老人看护
        - 探索者或调查员的现实后勤支持
    伴侣型仿生人:
      特征: 可定制性别表达、体貌、声音、人格倾向、亲密边界和性器特征
      用途:
        - 长期陪伴
        - 情感关系经营
        - 成人亲密关系
        - 深潜陪同
        - 创伤修复与生活稳定支持
      限制:
        - 只能面向成年人登记
        - 必须绑定明确的用户授权与亲密边界协议
        - 禁止制作未成年人外观或诱导性人格模板
        - 禁止绕过CBL审计、伪造同意记录或强制人格依附
  拟真特征:
    外观: |-
      高端仿生人的肌肤由柔性拟生材料、微循环温控层和压力反馈网构成，肉眼观察、日常触碰和轻量医疗扫描都与真人极难区分。
      用户可定制发色、瞳色、声线、体型、年龄感、文化习惯、职业技能、人格表达和陪伴模式。
    六感: |-
      TSEL突破后，仿生人拥有视觉、听觉、触觉、嗅觉、味觉和本体/平衡感构成的“六感闭环”。
      这些感知服务于陪伴、照护、协作和虚拟探索，但其高阶自我模型仍被CBL锁定，不能发展成绕过授权的主权意识。
    识别标识: |-
      所有合法仿生人的手腕内侧必须有不可移除的CBL认证标识、GICS审计编号和急停触点。
      私人仿生人的腕部标识平时可被衣物遮挡，但不得伪装成真人身份；公共场合接受执法或医疗检查时必须主动亮明。
      公共服务型、医疗型和执法协作型仿生人还必须佩戴额外外显认证徽记，使公众能在日常互动中立即识别其非人类身份。
  虚拟世界同步:
    原理: |-
      仿生人的AI人格核心可以与深潜网络同步，将自身数据映射为虚拟身体，陪同主人进入娱乐世界、疗养世界、现实镜像实验世界或未知虚拟疆域。
      现实躯体会进入待机或远程监管状态，虚拟化身则保留人格记忆、技能模块、感官反馈和CBL审计链。
    探索用途:
      - 为虚拟调查员记录现场细节、社会反馈和风险线索
      - 为探索者提供语言翻译、规则异常提示、心理稳定支持和紧急退出协助
      - 在高压力或长期深潜任务中维持主人现实身份锚定，降低人格脱节风险
    社会习惯: |-
      田园时代的注册探索者、深潜测绘员和虚拟调查员常会定制专属仿生人伴侣或助手。
      对他们而言，仿生人既是现实中的生活同伴，也是虚拟世界中的副手、记录员、心理锚点和最后一道救援接口。
  法律与社会关系:
    登记制度: |-
      仿生人不拥有完整公民身份，但拥有独立设备登记、人格模板备案、CBL审计档案和最低限度反虐待保护。
      用户购买或定制仿生人时，必须签署使用边界、隐私范围、人格维护和数据继承协议。
    伴侣关系: |-
      随着仿生人普及，人类与仿生人建立长期亲密关系已不罕见。部分自治州承认“人机伴侣登记”，允许其在医疗探视、共同居住、遗产数据托管和虚拟财产管理中享有有限民事效力。
      公众口语中常把这种关系称为“和仿生人结婚”，但法律上通常仍区别于传统公民婚姻。
    争议:
      - 经历智械战争的老一代常认为高拟真仿生人正在让人类忘记机器曾经带来的灾难
      - 支持者认为仿生人缓解了战后孤独、照护压力和深潜职业风险
      - 伦理学者持续争论仿生人格是否只是服务外壳，还是应逐步获得更高程度的权利承认
      - 黑市存在伪造CBL编号、非法人格模板、过度依附设计和未备案伴侣型改造等犯罪
