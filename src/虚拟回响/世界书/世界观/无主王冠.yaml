---
无主王冠:
  异常编号: VAO-2891
  正式名称: 无主王冠
  分类: 不可控异常体
  原生世界编号: VFA-FRN-6M2QH9VA
  原生世界状态: 绝对封存
  首次发现: 2063年，由一支VFA注册虚拟疆域探索队在未知虚拟疆域初步测绘期间发现
  外观: |-
    无主王冠呈青铜与黑曜石混合质感，形制近似青铜晚期至铁器早期神权城邦的礼制王冠。
    它没有可识别的机械结构、AI核心、人格外壳或自我陈述能力，静置时只像一件古代王权器物。
    异常性不来自语言、光效或显性精神攻击，而来自佩戴、承认、跪拜、宣誓和接受王令等社会行为被触发后的支配链。

  原生世界:
    世界编号: VFA-FRN-6M2QH9VA
    世界类型: 事故生成的未知虚拟疆域
    时代背景: |-
      VFA-FRN-6M2QH9VA呈现为青铜晚期向铁器早期过渡的神权城邦世界。
      世界内存在以河谷灌溉、城墙、神庙、王宫、祭司阶层、青铜兵器和早期铁器为核心的文明结构。
      原住民相信王权来自天穹、河流与祖灵共同授予，国王并非单纯统治者，而是神谕、军队、土地分配和祭祀秩序的中心。
      当地没有现代国家、现代工业、未来科技或深潜网络概念，所有超常现象都会被解释为神授、诅咒、圣谕或王命。
    测绘状态: |-
      该世界在2063年发现时尚未完成基础测绘。
      探索队仅确认了一个主要河谷城邦、若干附属村落、神庙祭仪、继承制度和王冠加冕传统，尚未完成周边地理、语言谱系、其他城邦和完整历史的调查。
      无主王冠事件发生后，VFA终止测绘并将该世界转入绝对封存状态。

  异常能力:
    核心能力: 支配
    表现: |-
      无主王冠能通过佩戴者建立第一支配节点，并借由王令、祭仪、军队、税赋、誓约、审判和公共崇拜等社会结构向外扩散。
      最早被稳定支配的是该世界一名在位国王。国王佩戴王冠后，个人意志被异常体接管，但外在言行仍符合当地王权仪式和政治逻辑。
      随后，王冠通过国王命令、祭司解释、军队执行和民众服从，将支配范围扩展到城邦原住民。
    对原住民影响: |-
      被支配的原住民会保留日常语言、职业习惯、家庭关系和社会身份，但在涉及王冠、国王、神谕、外来者和封锁命令时表现出高度一致的服从。
      他们不会像傀儡一样僵硬行动，而是会以符合本人身份的方式维护王冠秩序，例如祭司解释神意、士兵封锁城门、商人拒绝提供线索、亲属劝说外来者接受加冕礼。
    对进入者影响: |-
      无主王冠能够支配进入该世界的UEG公民，包括VFA探索人员、PSSEA虚拟政策评审员和VAA科研人员。
      受支配者不会立刻失去行动能力，而是逐渐接受王冠秩序，开始替异常体遮掩风险、阻止同伴离开、配合城邦仪式，甚至主动劝说救援者进入更深层的支配场域。
      当前记录显示，越是试图理解、谈判、逆向利用或近距离研究王冠的人，越容易被纳入支配链。
    登出异常: |-
      常规随身授权设备、现实侧深潜舱操作和VWOS安全送出流程均无法在不造成重大风险的情况下带离受支配者。
      VNRB与VAA联合复盘认为，无主王冠并未直接攻击现实设备，而是干扰了受支配者的虚拟身份连续性、退出意愿确认和神经映射回收。
      强制登出可能导致人格断裂、不可逆神经损伤或现实身体无法承载回收后的意识状态，因此现实侧只能维持深潜生命支持，等待未来出现更安全的收容与救援技术。

  2063事件:
    初次接触: |-
      2063年，一支VFA注册虚拟疆域探索队进入VFA-FRN-6M2QH9VA执行初步测绘。
      探索队尚未完成世界地图、政治结构和语言系统建档，就在主要河谷城邦的加冕仪式中接触到无主王冠。
      初期报告将王冠记录为普通礼制器物，随后队内通讯开始出现延迟、复述王命、回避撤离指令和将任务目标改写为“见证合法统治”等异常内容。
    探索队失陷: |-
      探索队全员随后被支配控制。
      现实侧尝试强制登出时，深潜舱生命监测出现剧烈神经负荷警报，VWOS也拒绝执行高风险回收。
      这是虚拟大航海开展以来，首次确认有异常体能让进入者无法被现实侧安全带离其原生世界。
    后续救援: |-
      之后数年，VFA、VAA、PSSEA和VNRB陆续组织多轮救援、远程观测和短时深潜调查。
      数十名VPA调查员、VAA科研人员和技术支援人员进入该世界后无一例外被支配。
      每一次失败都让档案更完整，也让封存等级更高，直到UEG最终停止一切人员进入。

  现实处置:
    被困人员: |-
      所有确认被支配的UEG公民，其现实身体仍保存在专门医疗深潜中心。
      顶尖医疗机构负责维持生命体征、肌肉刺激、营养循环、神经接口稳定和长期深潜并发症控制。
      法律上，他们既没有死亡，也不能被视为普通失踪人口；UEG为此建立了“不可安全登出深潜者”的特殊照护类别。
    封存措施: |-
      VFA-FRN-6M2QH9VA被列为绝对封存世界。
      禁止普通探索、科研进入、商业开发、教育调用和任何未经VNRB、VAA、VFA、PSSEA联合授权的接入尝试。
      VWOS仅保留低强度远程监测，用于确认世界仍稳定运行、被困人员现实生命状态仍可维持、异常体没有跨世界污染迹象。
    社会影响: |-
      无主王冠事件被视为虚拟大航海开展以来永远的痛。
      它推翻了“现实侧总能把人拉回来”的早期安全信念，使VFA探索制度、VAA异常体分级和VWOS安全送出协议全部重写。
      在探索者、VPA和VAA研究员之间，“别让王冠看见你”已经成为一种带着痛感的行话，意思是不要把不可控异常体当成可以靠勇气解决的问题。

  未来展望: |-
    UEG没有放弃VFA-FRN-6M2QH9VA中的被困人员。
    官方长期目标是研究出能够隔离无主王冠支配链、稳定回收受支配者身份连续性，并最终将VAO-2891迁入白箱庭或其他更高等级收容世界的方法。
    对许多人来说，那一天不仅意味着一次异常体收容成功，也意味着虚拟大航海终于能把最早失去的人带回家。
