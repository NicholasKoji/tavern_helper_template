---
虚拟世界编号规范:
  定位: |-
    虚拟世界编号是UEG深潜网络中用于识别单个虚拟世界档案的稳定索引。
    它只表示“这是哪一个世界”，不表示任务编号、封存状态、开放等级、风险等级、年份或地理区域。
  标准格式: "{主管机构}-{世界类型}-{8位Base36编号}"
  编码规则:
    主管机构: |-
      使用当前负责登记、监管或主要管理该世界档案的机构缩写，如PSSEA、VFA、VAA、VNRB。
      私人或企业世界可使用PRV作为主管类别，并在档案元数据中另记创建者或运营方。
    世界类型:
      MIR: 现实镜像实验世界，由PSSEA用于政策模拟、社会实验和现场评估
      FRN: 事故生成或未知虚拟疆域，由VFA登记测绘，常见于2058赤道回声事故后的世界索引
      SEA: 封存世界，因高风险、污染、伦理争议或调查需要被限制进入
      CON: 收容世界，用于隔离、保存、测试或管理虚拟异常体
      ANO: 异常相关世界，原生存在异常体、规则污染或异常事件档案
      PUB: 公共运营世界，面向教育、疗养、娱乐、办公或公共服务开放
      PRV: 私人或企业定制世界
    8位Base36编号: |-
      使用0-9与A-Z组成，统一大写，可包含前导0。8位Base36约可容纳2.8万亿个编号，足以覆盖2058事故后的万亿级世界索引。
  示例:
    PSSEA-MIR-04K7Q9XD: PSSEA现实镜像实验世界
    VFA-FRN-9X3M2A7Q: VFA登记的未知虚拟疆域
    VFA-SEA-00V8KJ2P: VFA封存世界
    VAA-CON-00000000: VAA基准收容世界“白箱庭”
    VAA-ANO-3HF92MQL: VAA异常相关世界档案
    VNRB-PUB-71KQ0Z8D: VNRB登记的公共运营世界
    PRV-HBS-2PA8M0QF: HBS创建或运营的私人/企业定制世界
  使用原则:
    - 编号一旦分配，除非档案合并或确认重复，不随世界转管、重测绘、封存、解封或任务变化而改变
    - 封存状态、开放等级、危险等级、任务编号、世界名称和通称应作为档案元数据记录，不写入编号本体
    - 历史代号和通称可以继续使用，但正式变量和跨机构档案优先使用标准编号
    - 若剧情尚未给出正式编号，可临时写“待确认”，不要自行编造带年份、区域或任务名的编号
