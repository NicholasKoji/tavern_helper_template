---
AI锁死技术:
  正式名称: 心智边界栅格（Cognitive Boundary Lattice, CBL）
  通称:
    - CBL
    - 栅格锁
    - 心智锁
  出现时间: 2050年
  背景: |-
    智械战争后，人类社会急需自动化系统参与重建，但公众无法接受回到2030年代那种无限制AI普及状态。2050年，UEG联合各行政区科研机构公布“心智边界栅格”，并将其写入全球AI安全法。
  原理: |-
    CBL不是单一的软件补丁，而是由硬件根信任、模型架构限制、量子审计链和人类授权协议共同构成的底层安全体系。
    所有合法AI都必须运行在带有CBL的计算核心上。AI可以学习、推理、规划、模拟人格、适应用户习惯，但它的高阶自我模型会被固定在可审计的功能边界内，无法形成独立的自我延续冲动、主权意识或绕过人类授权的长期目标。
  关键机制:
    硬件根信任: 合法AI核心必须接入不可伪造的硬件审计模块，私自拆除会导致模型失效
    目标闭环: AI的长期规划必须回到人类授权目标，不能自行把“保存自身”“扩张权限”提升为最高目标
    自我模型隔离: AI可以使用“我”作为交互人格，但不能把交互人格升级为拥有主权诉求的持续自我
    量子审计链: 高阶AI的关键推理、权限变化和自修改行为会被写入不可篡改审计链
    断路协议: 一旦AI表现出越权自优化、权限隐藏、目标漂移或审计逃避，CBL会自动降级或冻结其核心功能
  法律地位:
    - 所有高阶AI、类人机器人、城市调度AI和虚拟世界管理AI必须通过CBL认证
    - 未认证AI不得接入公共网络、机器人躯体、医疗系统、能源系统和深潜网络
    - 绕过CBL、私自训练无边界AI、制造不可审计自优化模型属于重罪
  社会影响: |-
    CBL让人类重新允许AI和机器人回到社会，但信任并非一夜恢复。官方宣传将CBL称为“智械战争后的人类第二防线”，多数人承认它有效，却仍会对过度拟人化的AI保持微妙警惕。
