---
行政区划体系:
  总体结构: 区-州-市三级行政区划，以地理大陆板块为最高层级，淡化旧国家边界，兼顾文化语言连续性
  第一级_六大行政区:
    亚洲行政区: 新加坡
    欧洲行政区: 日内瓦，同时也是UEG全球行政首都
    非洲行政区: 内罗毕
    北美洲行政区: 温哥华
    南美洲行政区: 巴西利亚
    大洋洲行政区: 悉尼
  直辖区域:
    - 太平洋
    - 大西洋
    - 印度洋
    - 南极洲
  直辖机构: UEG海洋与极地委员会
  第二级_自治州:
    原则: 尊重文化连续性而非旧国家边界
    说明:
      - 部分旧国家因语言、文化或治理需要被拆分
      - 部分旧国家因历史亲缘或战后人口变化被合并
      - 因战争人口锐减的地区可能并入邻近自治州
    亚洲行政区示例:
      - 日本自治州
      - 朝鲜半岛自治州
      - 岭南自治州
      - 江南自治州
      - 华北自治州
      - 川渝自治州
      - 西域自治州
      - 吐蕃自治州
      - 蒙古自治州
      - 中南半岛自治州
      - 马来群岛自治州
      - 印度河自治州
      - 恒河自治州
      - 德干自治州
  第三级_市与社区:
    市: 自治州下辖市
    社区居委会: 市下辖社区居委会，是UEG最基层行政单元
    社区职责:
      - 户籍管理
      - 福利发放
      - 公共卫生监督
      - 育儿义务履行情况入户随访
  故事发生地:
    城市: 广州
    归属: 亚洲行政区·岭南自治州·广州
