---
虚拟异常体:
  正式英文: Virtual Anomaly Object
  缩写: VAO
  定义: |-
    虚拟异常体是2058年赤道回声事故后，部分虚拟世界在运行过程中产生的规则异常聚合体。
    异常体可以表现为人类、动物、物品、建筑、区域、天气、声音、文字、仪式或重复发生的事件。它们的异常性只存在于虚拟世界内，不能影响现实世界。
  底层原则:
    - 异常体必须诞生于某个正在运行的虚拟世界
    - 异常体不能影响现实世界
    - 异常体的效果对原住民和进入者一视同仁
    - 通常情况下，进入者可通过随身授权设备、现实侧深潜舱操作或VWOS安全送出离开虚拟世界
    - 极少数不可控异常体可能干扰虚拟身份连续性、退出意愿确认或神经映射回收，使现实侧强制登出会造成不可接受的人格/神经损伤；此类事件不代表异常体直接影响现实，而是让进入者无法被安全带离其原生虚拟世界
    - 异常体不是普通程序错误，也不是未认证AI；它更接近虚拟世界规则在长期运行中凝结出的异常现象
  管理机构:
    名称: UEG虚拟异常管理局
    英文: Virtual Anomaly Administration
    缩写: VAA
    定位: |-
      VAA负责记录、评估、收容和研究虚拟异常体。它与VFA、PSSEA、VNRB保持协作关系，但职责不同：VFA负责虚拟疆域探索，PSSEA负责政策模拟实验，VNRB负责VWOS和深潜网络底层安全，VAA负责异常体本身。
    职责:
      - 建立异常体档案、风险等级和触发规则记录
      - 判断异常体是否可控、是否可迁移、是否可授权使用
      - 管理可控异常体收容、测试和任务调用
      - 对不可控异常体所在虚拟世界提出封存建议
      - 向VFA、PSSEA和VNRB通报异常污染、规则扰动和研究结论
  编号规范:
    标准格式: VAO-四位数字
    当前范围: 当前已登记虚拟异常体仍在VAO-3000以内
    编号含义: |-
      四位数字按VAA正式发现、登记或重新编档的顺序递增。
      编号大小只表示进入VAA档案序列的先后，不表示可控性、危险等级、所属世界、收容状态、研究价值或授权级别。
    使用原则:
      - 异常编号一经确认，除非档案合并、误登记或重新归档，不因迁入白箱庭、封存原生世界、风险等级变化而改变
      - 中文名称、通称、分类、触发规则、收容地点、原生世界编号和风险等级应另行记录，不写入编号本体
      - 引用异常体时可使用“异常编号 + 正式名称”的格式，例如“VAO-0184 审判钟”
  分类:
    可控异常体:
      定义: |-
        可控异常体占绝大多数。它们规则简单、稳定、可测试，可在VAA监控下迁移到专门收容世界，并在获得授权后用于调查、探索、研究或救援任务。
      判定条件:
        - 触发条件稳定
        - 影响范围有限
        - 可被记录、转移、暂停或隔离
        - 不会持续污染整个虚拟世界
        - 不会破坏VWOS安全送出机制
      处置原则:
        - 迁入白箱庭或其他VAA批准的收容区域
        - 建立档案编号、触发规则、影响范围和回收方案
        - 在测试确认稳定前不得外借给任务人员
        - 授权调用结束后必须复检，确认未发生规则扩散或性质变化
      使用原则:
        - 使用前必须明确任务目的、触发方式、风险边界和回收方案
        - 随行人员必须知道异常体的基本规则
        - 任务结束后必须交回VAA登记收容
    不可控异常体:
      定义: |-
        不可控异常体数量极少。它们不是因为单体强大才危险，而是因为会影响整个虚拟世界的运行秩序，使世界规则、原住民认知、社会制度或测绘结果持续失稳。
      判定条件:
        - 异常效果会扩散到整个虚拟世界
        - 触发条件无法稳定确认
        - 原住民认知、身份记录、地理结构或社会秩序出现大范围崩坏
        - 测绘档案持续失效
        - 迁移可能污染收容世界或其他虚拟世界
      处置原则:
        - 不迁入白箱庭
        - 原生虚拟世界封存
        - 仅允许VAA、VNRB和必要研究人员在严格授权下远程观测或短时进入
  可控异常体示例:
    审判钟:
      正式名称: 审判钟
      异常编号: VAO-0184
      规则: 钟声响起期间，说谎者会暂时失去声音。可被用于审讯。
    逆雨伞:
      正式名称: 逆雨伞
      异常编号: VAO-0279
      规则: 打开后，半径三米内雨水向上落。
    空椅子:
      正式名称: 空椅子
      异常编号: VAO-0416
      规则: 任何人坐上去后，周围人都会默认他已经离开。
    无字档案袋:
      正式名称: 无字档案袋
      异常编号: VAO-0734
      规则: 写入姓名后，与该姓名相同的人会被世界上的所有人遗忘，在世界上的身份痕迹全部消失。
    第十三盏路灯:
      正式名称: 第十三盏路灯
      异常编号: VAO-0961
      规则: 被它照到的人，会被原住民误认为本地居民。
    惯性外套:
      正式名称: 惯性外套
      异常编号: VAO-1215
      规则: 穿上后，无论重力如何变化，穿戴者都能像站在平地上一样行动。
    迟到的门:
      正式名称: 迟到的门
      异常编号: VAO-1739
      规则: 打开后不会立刻通向另一侧，而是在三分钟后把开门者送到他刚才想去的地方。
  不可控异常体示例:
    缺席公民:
      正式名称: 缺席公民
      异常编号: VAO-0528
      规则: 所有制度记录都承认它存在，但没人知道它是谁；调查越深入，越多原住民开始失去自己的身份痕迹。
    无明日镇:
      正式名称: 无明日镇
      异常编号: VAO-1482
      规则: 镇内每天醒来都是同一天，外来者能离开，但镇内原住民无法意识到日期重复。
    白色街区:
      正式名称: 白色街区
      异常编号: VAO-2146
      规则: 街区会缓慢扩大，被覆盖的区域只剩建筑轮廓，原住民仍照常生活，却逐渐失去姓名、职业和家庭关系。
    沉默法庭:
      正式名称: 沉默法庭
      异常编号: VAO-2670
      规则: 一旦开庭，整个世界内所有争端都会被强制提交审判，原有社会秩序会被法庭逻辑替代。
    无主王冠:
      正式名称: 无主王冠
      异常编号: VAO-2891
      原生世界编号: VFA-FRN-6M2QH9VA
      规则: 一顶青铜晚期至铁器早期神权城邦文明中的古代王冠，能支配佩戴者及其权力网络内的原住民，并进一步控制进入该世界的UEG公民。2063年发现后，首支探索队、后续救援VPA与VAA科研人员均被支配，且无法通过现实侧操作安全登出。
  社会观感: |-
    田园时代公众通常只知道VAA存在，并不知道具体异常体档案。可控异常体在专业人员眼中是危险但有价值的工具；不可控异常体则被视为2058事故留下的深层阴影。
    对VPA而言，异常体既可能成为任务辅助，也可能成为现实镜像实验世界失控的关键变量。
