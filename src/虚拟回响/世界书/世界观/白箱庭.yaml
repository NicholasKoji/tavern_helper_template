---
白箱庭:
  正式名称: VAA-0号收容世界
  通称: 白箱庭
  英文: White Enclosure
  管理机构: UEG虚拟异常管理局（VAA）
  定位: |-
    白箱庭是VAA专门建设的异常体收容虚拟世界，用于迁移、隔离、测试和保存可控异常体。
    它不是监狱，也不是自然社会，而是一处低叙事密度、低生态复杂度、高审计权限的虚拟收容环境。
  建设原则:
    - 只收容可控异常体
    - 不收容不可控异常体
    - 不建立自然社会，不设置自由发展的原住民群体
    - 物理规则尽量简化，方便判断异常体具体改变了什么
    - 所有测试区域由VWOS和VAA双重记录
  区域结构:
    观测区: 研究人员进入白箱庭后的默认工作区域，用于查看档案、调用监控和申请测试流程
    隔离区: 单个异常体的长期保存区域，不同异常体之间默认不互相接触
    测试区: 用于短时触发异常体规则、记录影响范围和确认可控边界
    恢复区: 测试后清除世界扰动、恢复物品状态和整理审计记录的缓冲区域
    封闭档案区: 存放高风险可控异常体的专门区域，进入需要VAA高级权限
  运行特征:
    - 默认时间流速与现实同步
    - 不使用复杂生态、历史背景或社会制度
    - 所有区域都可由现实侧深潜舱或VWOS安全送出
    - 每次异常体移动、测试、授权外借和回收都会写入审计链
    - 若异常体在白箱庭内表现出规则扩散、跨区污染或测绘失效迹象，将立即暂停测试并重新评估分类
  授权调用:
    申请方:
      - VAA研究人员
      - VFA注册探索队
      - PSSEA虚拟政策评审员
      - 经VNRB批准的专项调查人员
    流程:
      - 提交任务编号、调用目的、预计使用场景和回收方案
      - VAA审核异常体适配性和风险等级
      - VWOS记录授权范围并生成任务期临时调用凭证
      - 任务结束后异常体必须返回白箱庭并接受复检
  禁止事项:
    - 将不可控异常体迁入白箱庭
    - 在白箱庭内进行未经授权的多异常体交互实验
    - 将异常体长期交由个人、企业或地方机构保管
    - 删除或伪造异常体测试记录
  叙事意义: |-
    白箱庭让UEG能够把大部分可控异常体纳入秩序，同时也提醒所有研究者：收容世界本身不是绝对安全，只是目前最可控的容器。
