---
虚拟大航海:
  起点: 2058年量子加速器事故后
  定义: |-
    “虚拟大航海”是UEG在2058年量子加速器事故后发起的全球性虚拟疆域探索运动。数以万亿计的未知虚拟世界被发现后，UEG没有下令删除，而是将其视为人类进入宇宙大航海时代前的预演场。
  时代背景:
    太空电梯: |-
      2058年前后，地球第一座太空电梯完成竣工，近地轨道建设成本骤降。轨道工厂、月球中继站、深空探测器和火星运输计划进入加速阶段。
    火星殖民: |-
      火星殖民被正式提上日程。UEG需要训练大量能够适应封闭环境、未知生态、异质规则和长期远离地球心理压力的公民与专业人员。
    意识转向: |-
      三战和智械战争后，UEG长期强调安全、统一和秩序；而虚拟大航海第一次让普通公众大规模参与“探索未知”，并使探索重新成为全球性的正面叙事。它被宣传为从田园时代走向宇宙时代的过渡训练。
  管理机构:
    UEG虚拟疆域管理局:
      英文: Virtual Frontier Administration
      简称: VFA
      职责:
        - 管理2058事故后产生的未知虚拟世界索引
        - 发放虚拟世界探索执照
        - 审批探索队、科研机构、救援单位、教育项目和商业开发主体
        - 维护世界测绘档案、危险等级、退出点、时间倍率和规则异常记录
        - 监管深潜安全、CBL合规、世界内AI/NPC异常和虚拟财产争议
        - 组织虚拟世界救援、失联调查和污染隔离
    虚拟疆域测绘署:
      隶属: UEG虚拟疆域管理局
      职责:
        - 为未知世界分配编号与坐标
        - 记录物理规则、生态结构、文明等级、语言系统和危险因素
        - 制定世界开放等级：封存、科研限定、执照探索、教育开放、旅游开放、殖民模拟
  探索制度:
    探索执照:
      - 普通公民可申请低风险世界短期探索许可
      - 专业探索员需接受深潜急救、规则异常识别、心理稳定性和CBL基础课程
      - 高危世界只允许认证探索队、科研机构和VFA救援单位进入
    探索队:
      正式名称: 注册虚拟疆域探索队
      构成:
        - 深潜测绘员
        - 虚拟生态观察员
        - 规则异常分析员
        - CBL安全工程师
        - 心理监护员
        - 救援联络员
    基本流程:
      - 申请世界坐标与探索时段
      - 提交深潜舱安全配置和退出协议
      - 进入世界后记录规则、地形、生态、NPC或文明样本
      - 返回后向VFA上传测绘报告、风险评估和可公开资料
  风险:
    - 世界规则不稳定，可能出现重力、时间、疼痛、记忆连续性或身体映射异常
    - 部分世界存在无法预测的NPC文明、敌对生态或自主演化社会结构
    - 高倍率时间流速可能导致探索者出现心理脱节、身份混淆或现实适应困难
    - 某些世界的退出点会漂移，需要外部救援队强制牵引
    - 未授权商业开发可能造成世界污染、虚拟原住生态破坏或数据走私
  社会影响: |-
    虚拟大航海让田园时代的人类重新拥有开拓叙事。许多年轻人不再满足于消费成熟虚拟世界，而是申请成为注册探索员、深潜测绘员或虚拟疆域开拓者。
    电视节目、教育课程、艺术创作和公共竞赛都围绕未知世界展开。对一些人来说，未知虚拟世界是通往宇宙时代的训练场；对另一些人来说，它们是逃离现实、重塑自我、寻找第二人生的无尽海洋。
  常用称呼:
    未知世界: 事故后生成、尚未完成测绘的虚拟世界
    世界种子: 尚未完全展开的休眠虚拟世界
    开拓者: 参与未知世界初次探索的人
    测绘回执: 探索者返回后提交给VFA的正式报告
    封存世界: 被判定风险过高、禁止普通探索的世界
