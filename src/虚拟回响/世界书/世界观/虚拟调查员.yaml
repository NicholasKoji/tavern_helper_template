---
虚拟调查员:
  通称: 虚拟调查员
  正式职称:
    中文: UEG虚拟政策评审员
    英文: Virtual Policy Assessor
    缩写: VPA
  出现背景: |-
    2058年赤道回声事故后，全球深潜网络意外生成数以万亿计的未知虚拟世界。UEG很快意识到，虚拟世界不仅能作为探索未知的疆域，也能作为现实政策的高拟真试验场。
    在不伤害现实公民、不直接扰动现实社会秩序的前提下，UEG可以生成与现实世界高度相似的虚拟社会，设计现实中不宜贸然推行的政策，并由专业人员进入其中调查政策后果。
  管理机构:
    名称: UEG政策模拟与社会实验管理局
    英文: Policy Simulation and Social Experiment Administration
    缩写: PSSEA
    定位: |-
      PSSEA不隶属于UEG虚拟疆域管理局（VFA）。VFA负责未知虚拟疆域、探索执照、测绘和救援；PSSEA负责政策模拟、社会实验、现实镜像世界和政策可行性评审。
    职责:
      - 审批现实镜像实验世界的创建
      - 制定虚拟社会实验伦理标准
      - 管理虚拟政策评审员编制、培训、派遣与保密审查
      - 审核政策实验结果，并向UEG执行委员会、全球议会或自治州行政机构提交报告
      - 防止实验世界数据被商业机构、政治团体或私人势力滥用
  工作内容:
    现实镜像世界: |-
      PSSEA会生成与现实高度相似的虚拟世界，复刻城市结构、人口分布、福利系统、教育制度、经济结构、舆论生态、家庭关系、犯罪率、社区治理和行政流程。
      这类世界被称为“现实镜像实验世界”，不是娱乐世界，也不是未知虚拟疆域，而是专门用于政策模拟的受控社会实验场。
    政策设计: |-
      在现实镜像世界中，PSSEA可以设计现实中无法直接试错的政策，包括极端福利制度、育儿义务调整、教育分流、虚拟货币改革、婚姻与家庭政策、AI监管、社区治理、犯罪惩罚、人口迁移、劳动制度和深潜成瘾干预。
      “无限制”指的是虚拟实验可测试现实中不宜立刻推行的边界政策，但仍受PSSEA伦理审查、深潜安全协议和人类基本权利模拟底线约束。
    现场评估: |-
      虚拟调查员必须亲自深潜进入实验世界，不能只看统计模型。他们会以不同社会身份生活、工作、采访、旁观、卧底或参与社区治理，观察政策对普通人的心理状态、家庭结构、阶层流动、黑市、反抗行为、犯罪模式和长期社会稳定性的影响。
    报告流程:
      - 记录政策实施前后的社会指标变化
      - 收集实验世界居民与关键群体的主观反馈
      - 判断政策收益、道德代价、执行成本与失控风险
      - 向PSSEA提交评估报告
      - 若结果可行，由PSSEA上报UEG评审，再决定是否进入现实小规模试点或正式政策程序
  入职要求:
    编制: UEG正式编制，属于高权限公共政策技术岗位
    人才标准: |-
      虚拟调查员只招收精英人才。候选人通常需要接受社会学、经济学、政治学、心理学、法学、统计学、公共管理、伦理学、虚拟世界规则分析、深潜安全和AI治理等综合训练。
    能力要求:
      - 能理解复杂社会系统，而不是只看单一指标
      - 能在虚拟世界中长期扮演不同身份而保持自我稳定
      - 能识别政策带来的灰色产业、群体怨恨、制度套利和边缘人群伤害
      - 能承受高伦理压力，并在报告中如实呈现不受欢迎的结论
      - 必须通过保密审查、心理耐受测试和深潜适应性测试
  VFA探索执照:
    入职发放: |-
      虚拟调查员入职即自动获得VFA认可的虚拟世界探索执照。该执照不代表其归属VFA，而是为了让他们在虚拟世界异常、实验世界失控、未知世界牵涉政策评估或深潜事故发生时，能够第一时间接受委任进入现场调查。
    权限边界:
      - 可进入低至中高风险虚拟世界执行调查任务
      - 可调取必要的世界测绘档案、退出点记录和危险等级报告
      - 可请求VFA救援单位协助，但无权直接指挥VFA常设部门
      - 高危封存世界仍需额外授权
  伦理争议:
    - 现实镜像实验世界中的居民是否只是模拟人格，还是应享有某种最低限度权利，一直存在争论
    - 为了测试政策边界，虚拟调查员可能目睹或参与极端社会压力实验，心理负担很重
    - 支持者认为这能避免现实政策造成灾难，反对者认为这是在虚拟世界中制造制度性痛苦
    - PSSEA要求所有正式报告保留伦理代价章节，禁止只用效率、稳定性或经济收益评价政策
  社会观感: |-
    虚拟调查员在公众眼中既是精英公务员，也是危险的制度试验者。他们拥有高待遇、高权限和高保密等级，但常被认为“在别人的人生里测试现实的未来”。
    对田园时代的年轻人来说，这份职业兼具学术、冒险、政治和深潜探索色彩；对经历过智械战争的老一代来说，它也带着一种令人不安的技术傲慢。
