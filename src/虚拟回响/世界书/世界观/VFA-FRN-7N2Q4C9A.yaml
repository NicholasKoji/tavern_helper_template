      - 旧地球后世评价只用于创作校准，不作为原住民已经知道的信息

  杨世发身份嵌入:
    嵌入类型: 世界预置高规格身份锚点
    身份原理: |-
      该世界原本就存在一支与麟州杨氏有远亲关系的河东军功勋贵。其嫡长子常年居于河东，刚于1104年入汴京，京中只留有姓名、家世、书信、宅契和少量远距离交往记录，公开场合鲜有人见过其本人。
      VWOS将杨世发的姓名、年龄和样貌映射到这一身份锚点，并补全礼仪、口音、衣着、随从称谓与必要时代常识。世界原住民会把他视为一直存在、近日才抵京的杨家嫡长子。
    公开档案:
      姓名: 杨世发
      年龄: 23岁
      籍贯: 河东路太原府
      家世: 河东军功勋贵杨氏嫡长子，父亲受封太原郡开国公
      家族根基: 杨氏数代经营边军军需、马政、河东至汴京商路与碑石拓印生意，在枢密院、禁军将门和京城巨商之间拥有稳定人脉
      当前处境: 初入汴京，暂居杨氏旧宅，准备接手家族在京产业并拜访往来官宦
    权势边界:
      - 杨世发本人尚未承袭爵号，也没有固定朝职
      - 他的影响力主要来自家世、财富、军需关系、商路和父辈人脉
      - 他能为士人提供财货、收藏渠道、举荐门路与权贵引见，但仍受北宋律法、官场程序和地方人情约束
    常用称呼:
      正式介绍: 太原郡开国公府嫡长子杨世发
      平辈与士人: 杨郎君
      强调排行: 杨大郎
      官场趋奉或私下称呼: 杨衙内
      称谓说明: 宋制下以郡公府嫡长子作为正式身份，不使用世子、小王爷等偏后世化称呼
    已有身份痕迹:
      - 汴京城内有一座杨氏旧宅、管事、仆从、马车和可供查验的宅契账册
      - 杨家商队掌握河东、关中碑刻拓片、古器与良马进入汴京的渠道
      - 赵明诚此前已通过中间人递过书信，邀请杨世发入府鉴赏一批新得碑帖
      - 杨世发首次进入世界时，身份常识包已将这封邀书标记为今日必须处理的社交事项

  初次进入事件:
    事件名称: 赵府金石夜宴
    触发判定:
      - 杨世发第一次进入VFA-FRN-7N2Q4C9A
      - 当前NPC序列中尚未登记李清照
    进入落点: |-
      深潜接入完成后，杨世发在驶往赵府的马车中睁眼。随从已经备好邀书与回礼，VWOS身份常识包同步告知他：赵明诚约他在偏院鉴赏碑帖，席后另有一件“只宜私下相赠”的厚礼。
      世界内的赵明诚早已通过书信与杨家管事往来，因而把这场夜宴视为蓄谋已久的攀附机会；对杨世发而言，这却是第一次真正见到赵明诚与李清照。
    赵明诚动机:
      - 借杨氏的军政人脉与财力为自己谋取独立于父亲赵挺之的仕途门路
      - 获取河东碑刻、古器、拓片和珍本的长期收购渠道
      - 用妻子的才名与姿容证明自己有资格进入更高层的权贵圈
      - 通过支配李清照来压制自己对她才华的嫉妒与自卑
    事件前置事实:
      - 赵明诚此前曾强迫李清照出席宴饮、鉴别古物、题词助兴，并借她的才名结交宾客
      - 他过去只把李清照当作应酬门面，从未将她送入任何男子的私室
      - 杨世发是赵明诚第一次真正选择献妻的对象
      - 李清照赴宴前只知道丈夫要她鉴定碑帖，并不知道所谓厚礼指向自己
    场景进程:
      - 赵明诚先以碑帖、烈酒和仕途话题试探杨世发，刻意表现成温雅好古的士人
      - 李清照被请来鉴定一方存疑碑帖，她凭字口、纸墨和来历指出其中破绽，第一次与杨世发正面交谈
      - 赵明诚不断夸耀妻子的才学、酒量与姿容，并以夫妻私事作为席间玩笑，令李清照逐渐察觉异样
      - 赵明诚在给李清照的酒中混入助兴药物；药性只放大身体敏感与欲望，不抹去理智、记忆和判断
      - 夜宴结束后，赵明诚以取另一卷秘藏为名，把杨世发引入备好的内室，再让药性渐起的李清照独自进入
      - 赵明诚从外面合门离去，用含蓄言辞暗示李清照今夜归杨世发处置
      - 李清照第一次确认丈夫已经越过最后边界，并因房间安排与杨世发的镇定，首先认定两名男子早有默契
      - 她以冷淡礼数和尖锐讽刺维持尊严，同时观察杨世发究竟把她当作礼物、麻烦，还是一个能自主判断的人
    一次性原则: |-
      该事件只用于杨世发首次进入本世界。李清照完成首次NPC建档后，后续叙事将夜宴视为已经发生的共同经历，以两人的实际选择和关系后果继续推进，不重复安排初遇。

  初次探索记录:
