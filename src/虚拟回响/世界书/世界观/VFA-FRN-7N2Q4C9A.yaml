    - 身份嵌入应使用该时代能被接受的身份，如商人、随从、译员、士人、僧侣、军士、医者、旅人或地方雇员

  人物与历史偏差原则:
    宏观同轨: |-
      该世界重点复刻公元1104年的政权格局、社会制度、生产水平、交通通信、礼法习俗与公开历史节点。
      北宋、大辽、西夏等主要政权及其公开政治走向大体对应旧地球记录，不因个别人物私事发生无因果的大范围偏移。
    微观异史: |-
      历史人物的性格、私生活、夫妻关系、未见于公开记录的交往与地方事件允许出现显著差异。
      世界中的李清照、赵明诚等人是依托历史身份生成的独立原住民，其私人经历以本世界已经发生的事实为准，而非旧地球传记的逐字复现。
    扮演边界:
