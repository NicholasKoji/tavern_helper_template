---
田园时代:
  起点: 2050年后
  定义: |-
    “田园时代”是智械战争后人类重新启用受控AI、机器人和虚拟世界技术后形成的社会阶段。它并不是回到农业田园，而是指物质生产高度自动化、基础生活保障充分、精神娱乐极度丰富，人类可以像生活在被技术托举的田园中一样，把大量时间投入体验、创造、关系和自我塑造。
  形成条件:
    - CBL技术锁死AI再次觉醒的主要路径，让合法AI与机器人重新获得社会许可
    - 赤道量子加速器经过战后修复，为全球自动化和虚拟世界提供近乎无尽的算力
    - 战后人口结构和基础设施缺口迫使UEG重新依赖自动化劳动
    - 深潜虚拟网络爆发式发展，给公众提供近乎无限的精神娱乐场景
  社会状态:
    物质层面:
      - 机器人承担大部分重复劳动、危险劳动、护理辅助、物流配送和基础设施维护
      - UEG福利体系保障公民的基础住房、医疗、教育、食物和网络接入
      - EC仍是统一货币，但基础生存成本大幅下降，稀缺更多体现在权限、体验、名誉、创造力和现实空间
    精神层面:
      - 大量公民把虚拟世界视为第二生活场所
      - 教育、疗养、社交、恋爱模拟、历史体验、艺术创作和职业训练都可以在虚拟世界中完成
      - 现实生活不再只由劳动定义，个人身份越来越依赖兴趣共同体、虚拟经历和自我叙事
  潜在矛盾:
    - 老一代人的智械战争创伤与年轻一代的AI依赖之间存在代际裂痕
    - 现实身体的脆弱与虚拟生活的无限可能形成心理落差
    - “真实经历”和“虚拟经历”在伦理、情感和法律上不断发生争议
    - 过度沉溺虚拟世界、逃避现实义务、非法深潜改造成为新型社会问题
