---
历史节点:
  1991_苏联未解体: |-
    1991年8月，苏联副总统亚纳耶夫领导的紧急状态委员会成功控制局势，戈尔巴乔夫被永久软禁。克格勃与军方强硬派全面接管权力，苏联非但未解体，反而进入战时动员状态。西方制裁与军事对峙迅速升级。
  1992_1998_第三次世界大战: |-
    1992年3月，苏联以“防止北约东扩威胁苏维埃领土完整”为由，对东欧发动大规模常规进攻。北约依据第五条集体防御条款应战，战火迅速蔓延至中东、东亚、非洲，几乎所有地区大国均被卷入。
    核武器全程未被使用，双方均慑于MAD原则，但常规战争烈度远超二战：精确制导饱和轰炸、生化武器局部使用、太空轨道武器实战化部署。六年战争造成全球约18亿人口伤亡（含间接死亡），基础设施破坏率超过40%，多个中小国家事实上灭国。
  1998_日内瓦永久和平协定: |-
    六年消耗战后，各国精疲力竭，民众反战情绪达到临界点。1998年7月，幸存主要参战国代表在日内瓦签署《永久和平协定》。
    协定核心包括：全面废除国家军队，仅保留联合维和力量；解散一切军事同盟；成立地球联合政府筹备委员会。
  1999_2004_过渡时期: |-
    筹备委员会用五年时间完成大规模政治整合，将两百余个主权实体纳入统一治理体系。
    2004年1月1日，地球联合政府（United Earth Government, UEG）在日内瓦正式成立，人类进入单政府时代。
