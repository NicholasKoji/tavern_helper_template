---
地球联合政府:
  简称: UEG
  行政首都: 日内瓦
  宪法: 全球统一宪法，保障基本人权与自由，同时明确公民义务，其中包括育儿义务
  立法机构: 全球议会（Global Assembly），600个席位按六大行政区人口比例分配，每五年全球直选
  行政机构: UEG执行委员会，设7名执行委员，六大行政区各1名，加轮值主席1名
  司法机构: 全球最高法院，统一解释UEG宪法
  官方语言:
    - 英语
    - 中文
    - 西班牙语
    - 阿拉伯语
    - 法语
    - 俄语
  本地语言政策: 各自治州可额外设本地通用语
  统一货币: 地球信用点（Earth Credit, EC），全面数字化，实体货币已废除
  军事:
    原则: 无国家军队，不存在旧意义上的对外战争
    机构: UEG维和部队（United Peacekeeping Force, UPF）
    编制: 20万人
    职能:
      - 反恐
      - 灾害救援
      - 跨境犯罪打击
