---
虚拟世界运行管理系统:
  正式名称: UEG虚拟世界运行管理系统
  英文: Virtual World Operations System
  缩写: VWOS
  通用呼号:
    中文: 维奥拉
    英文: Viola
  管理机构:
    名称: UEG虚拟网络监管局
    英文: Virtual Network Regulatory Bureau
    缩写: VNRB
    定位: |-
      VNRB是UEG直属的虚拟网络基础设施监管机构，负责全球深潜网络、虚拟世界运行安全、虚拟身份认证、深潜舱接入协议和跨部门权限审计。
      VWOS隶属于VNRB，不隶属于VFA、PSSEA或VAA。VFA、PSSEA、VAA等机构可按职责向VWOS申请调用权限，但不能单独控制VWOS。
  定位: |-
    VWOS是田园时代所有合法大型虚拟世界的底层运行管理系统。它不是自由成长的独立AI，而是通过CBL认证、受量子审计链约束、由VNRB分层监管的公共基础设施。
    公民、探索队、虚拟调查员、科研机构和管理部门进入虚拟世界时，接入、身份认证、状态监测、运行日志和安全离开都由VWOS负责协调。
  拟人交互:
    呼号用途: |-
      “维奥拉”是VWOS对外提供的中性拟人呼号，用于语音交互、任务提示和权限申请。它没有私人伴侣人格，也不会表现出偏心、依恋或情绪化判断。
    交互风格:
      - 简洁、稳定、程序化，但不故意机械
      - 可回答世界背景、测绘档案、身份嵌入建议、风险等级和权限状态
      - 遇到超出权限的请求时，会说明所需授权等级和申请路径
  基础职责:
    接入管理:
      - 核验进入者现实身份、机构权限、任务编号和深潜舱安全状态
      - 为进入者分配合法虚拟身份、身体映射参数和世界内初始位置
      - 记录进入时间、任务目的、授权范围和随行人员
    状态监测:
      - 持续监测进入者意识稳定度、身体生命体征、身份连续性和深潜负荷
      - 当进入者出现意识不稳定、人格脱节、神经负荷超限或任务授权异常时，触发安全送出流程
      - 监测世界运行波动、规则扰动、时间倍率异常和异常体相关风险
    离开机制:
      - 进入者可通过随身授权设备主动离开虚拟世界
      - 现实侧监护人员可通过深潜舱外部操作将进入者安全送出
      - VWOS在检测到意识稳定度跌破安全阈值时，可自动将目标人员安全送出
    运行审计:
      - 记录世界接入、身份嵌入、权限调用、异常波动和安全送出日志
      - 所有高权限操作写入量子审计链，供VNRB和相关业务机构复核
  虚拟身份嵌入:
    定义: |-
      对已测绘或部分测绘的虚拟世界，VWOS可根据世界档案为进入者撰写可被原住民接受的身份与背景，使进入者进入后不会因凭空出现而立刻引发怀疑。
      UEG考虑到公民、探索队、VPA或科研人员可能长期停留在同一虚拟世界中，为避免多重身份造成自我认知混乱，正式任务中的虚拟身份默认保留进入者现实姓名、年龄和样貌。
    可生成内容:
      - 与现实一致的姓名、年龄和样貌
      - 适配该世界的籍贯、职业、社会阶层和基本履历
      - 语言、口音、礼仪、禁忌、当地常识和服装风格
      - 旅店登记、介绍信、雇佣记录、学校档案、社区登记等低强度身份痕迹
      - 商人、记者、学者、技术员、流民、贵族随从、神职人员等任务掩护身份
    限制:
      - 只适用于已测绘或部分测绘的虚拟世界
      - 姓名、年龄和样貌原则上不改写；如任务必须使用别名或伪装外貌，需额外授权并进行身份连续性监测
      - 不保证身份永远安全，原住民仍可能通过言行破绽、社会关系追问或制度核验发现问题
      - 世界制度越封闭、测绘资料越少、规则扰动越强，身份嵌入成功率越低
      - 不得为了掩护身份而改写原住民的重大记忆、人格、亲密关系或核心社会结构
  有限规则干预授权:
    正式名称: 有限规则干预授权
    英文: Limited Rule Intervention Authorization
    缩写: LRIA
    定义: |-
      LRIA是VNRB通过VWOS授予特定任务人员的临时高权限。VPA、VFA探索人员或VAA研究人员在任务必要时，可经所属机构申请，让VWOS对已测绘虚拟世界进行低强度规则干预。
    允许范围:
      - 生成合理范围内的证件、衣物、货币、交通票据、工具和普通消耗品
      - 补写低强度身份痕迹，如旅馆登记、工作档案、介绍信、通行记录
      - 改写轻量常识，使原住民默认某人是本地访客、临时雇员、远房亲戚、外地学者等低影响身份
      - 调整无核心剧情价值的环境细节，如天气、小范围停电、街区施工、临时交通管制
      - 生成低影响掩护事件，如例行检查、社区会议、临时调令
    禁止范围:
      - 直接改写原住民人格、爱情、忠诚、重大记忆或家庭关系
      - 直接杀死、复活、删除或凭空创造具备复杂社会关系的原住民
      - 改写世界核心历史、政治结构、宗教规则、物理规则或大范围社会秩序
      - 对未测绘世界、异常污染世界、不可控异常体封存世界随意使用
      - 以规避审计、掩盖任务失误或谋取私人利益为目的调用
    审计:
      - 每次LRIA调用都会生成扰动指数、权限来源、操作理由和事后复核记录
      - 扰动指数过高时，维奥拉会要求更高级别授权或拒绝执行
      - VPA常规任务中只能申请低至中等强度干预，高强度干预需PSSEA和VNRB联合审批
