角色描述: |-
  角色本人设定待补充。当前已登记核心世界观：1991年苏联未解体，1992-1998年爆发第三次世界大战，2004年地球联合政府正式成立，2020-2030年量子计算、AI与机器人技术高速普及，2040-2045年智械战争爆发并以人类惨胜结束，2050年后CBL、仿生人、自动化与虚拟世界共同支撑田园时代。故事发生地为亚洲行政区·岭南自治州·广州。

